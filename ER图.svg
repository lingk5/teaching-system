<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1080" viewBox="0 0 1600 1080">
  <defs>
    <style>
      .entity { fill: #ffffff; stroke: #222222; stroke-width: 2.2; }
      .relation { fill: #ffffff; stroke: #222222; stroke-width: 2.2; }
      .attribute { fill: #ffffff; stroke: #222222; stroke-width: 2.0; }
      .line { stroke: #222222; stroke-width: 2.2; fill: none; }
      .entity-text { font: 700 22px "SimSun", "Songti SC", serif; fill: #222222; }
      .relation-text { font: 700 20px "SimSun", "Songti SC", serif; fill: #222222; }
      .attr-text { font: 18px "SimSun", "Songti SC", serif; fill: #222222; }
      .card { font: 18px "Times New Roman", serif; fill: #222222; }
      .title { font: 700 28px "SimSun", "Songti SC", serif; fill: #222222; }
    </style>
  </defs>

  <rect width="1600" height="1080" fill="#ffffff"/>
  <text x="800" y="46" text-anchor="middle" class="title">图4.5 数据库 E-R 图</text>

  <!-- 用户 -->
  <rect x="120" y="220" width="180" height="92" class="entity"/>
  <text x="210" y="275" text-anchor="middle" class="entity-text">用户</text>
  <ellipse cx="85" cy="150" rx="82" ry="42" class="attribute"/>
  <text x="85" y="158" text-anchor="middle" class="attr-text">用户名</text>
  <line x1="135" y1="185" x2="170" y2="220" class="line"/>
  <ellipse cx="270" cy="125" rx="82" ry="42" class="attribute"/>
  <text x="270" y="133" text-anchor="middle" class="attr-text">姓名</text>
  <line x1="255" y1="167" x2="240" y2="220" class="line"/>
  <ellipse cx="90" cy="380" rx="82" ry="42" class="attribute"/>
  <text x="90" y="388" text-anchor="middle" class="attr-text">角色</text>
  <line x1="145" y1="350" x2="185" y2="312" class="line"/>

  <!-- 课程 -->
  <rect x="460" y="220" width="200" height="92" class="entity"/>
  <text x="560" y="275" text-anchor="middle" class="entity-text">课程</text>
  <ellipse cx="490" cy="118" rx="96" ry="42" class="attribute"/>
  <text x="490" y="126" text-anchor="middle" class="attr-text">课程名称</text>
  <line x1="515" y1="160" x2="535" y2="220" class="line"/>
  <ellipse cx="650" cy="118" rx="88" ry="42" class="attribute"/>
  <text x="650" y="126" text-anchor="middle" class="attr-text">课程代码</text>
  <line x1="630" y1="160" x2="605" y2="220" class="line"/>
  <ellipse cx="560" cy="388" rx="76" ry="40" class="attribute"/>
  <text x="560" y="396" text-anchor="middle" class="attr-text">学期</text>
  <line x1="560" y1="348" x2="560" y2="312" class="line"/>

  <!-- 班级 -->
  <rect x="840" y="220" width="180" height="92" class="entity"/>
  <text x="930" y="275" text-anchor="middle" class="entity-text">班级</text>
  <ellipse cx="948" cy="122" rx="88" ry="42" class="attribute"/>
  <text x="948" y="130" text-anchor="middle" class="attr-text">班级名称</text>
  <line x1="944" y1="164" x2="936" y2="220" class="line"/>

  <!-- 学生 -->
  <rect x="800" y="650" width="180" height="92" class="entity"/>
  <text x="890" y="705" text-anchor="middle" class="entity-text">学生</text>
  <ellipse cx="650" cy="585" rx="78" ry="40" class="attribute"/>
  <text x="650" y="593" text-anchor="middle" class="attr-text">学号</text>
  <line x1="705" y1="615" x2="800" y2="680" class="line"/>
  <ellipse cx="650" cy="685" rx="78" ry="40" class="attribute"/>
  <text x="650" y="693" text-anchor="middle" class="attr-text">姓名</text>
  <line x1="728" y1="685" x2="800" y2="696" class="line"/>
  <ellipse cx="650" cy="785" rx="88" ry="40" class="attribute"/>
  <text x="650" y="793" text-anchor="middle" class="attr-text">性别</text>
  <line x1="735" y1="775" x2="800" y2="720" class="line"/>

  <!-- 右侧记录实体 -->
  <rect x="1230" y="120" width="220" height="84" class="entity"/>
  <text x="1340" y="172" text-anchor="middle" class="entity-text">考勤记录</text>
  <rect x="1230" y="300" width="220" height="84" class="entity"/>
  <text x="1340" y="352" text-anchor="middle" class="entity-text">作业记录</text>
  <rect x="1230" y="648" width="220" height="84" class="entity"/>
  <text x="1340" y="700" text-anchor="middle" class="entity-text">测验记录</text>
  <rect x="1230" y="798" width="220" height="84" class="entity"/>
  <text x="1340" y="850" text-anchor="middle" class="entity-text">互动记录</text>
  <rect x="1110" y="938" width="220" height="84" class="entity"/>
  <text x="1220" y="990" text-anchor="middle" class="entity-text">预警记录</text>

  <!-- 关系 -->
  <polygon points="320,266 380,206 440,266 380,326" class="relation"/>
  <text x="380" y="274" text-anchor="middle" class="relation-text">开设</text>

  <polygon points="700,266 760,206 820,266 760,326" class="relation"/>
  <text x="760" y="274" text-anchor="middle" class="relation-text">包含</text>

  <polygon points="830,540 890,480 950,540 890,600" class="relation"/>
  <text x="890" y="548" text-anchor="middle" class="relation-text">拥有</text>

  <polygon points="1050,162 1110,102 1170,162 1110,222" class="relation"/>
  <text x="1110" y="170" text-anchor="middle" class="relation-text">记录</text>

  <polygon points="1050,342 1110,282 1170,342 1110,402" class="relation"/>
  <text x="1110" y="350" text-anchor="middle" class="relation-text">布置</text>

  <polygon points="1060,690 1120,630 1180,690 1120,750" class="relation"/>
  <text x="1120" y="698" text-anchor="middle" class="relation-text">完成</text>

  <polygon points="1060,840 1120,780 1180,840 1120,900" class="relation"/>
  <text x="1120" y="848" text-anchor="middle" class="relation-text">参与</text>

  <polygon points="920,980 980,920 1040,980 980,1040" class="relation"/>
  <text x="980" y="988" text-anchor="middle" class="relation-text">触发</text>

  <!-- 用户-课程 -->
  <line x1="300" y1="266" x2="320" y2="266" class="line"/>
  <line x1="440" y1="266" x2="460" y2="266" class="line"/>
  <text x="306" y="255" class="card">1</text>
  <text x="444" y="255" class="card">n</text>

  <!-- 课程-班级 -->
  <line x1="660" y1="266" x2="700" y2="266" class="line"/>
  <line x1="820" y1="266" x2="840" y2="266" class="line"/>
  <text x="672" y="255" class="card">1</text>
  <text x="828" y="255" class="card">n</text>

  <!-- 班级-学生，改为纵向，避免交叉 -->
  <line x1="930" y1="312" x2="930" y2="480" class="line"/>
  <line x1="930" y1="600" x2="930" y2="650" class="line"/>
  <text x="942" y="392" class="card">1</text>
  <text x="942" y="636" class="card">n</text>

  <!-- 班级-考勤 -->
  <line x1="1020" y1="250" x2="1050" y2="162" class="line"/>
  <line x1="1170" y1="162" x2="1230" y2="162" class="line"/>
  <text x="1038" y="212" class="card">1</text>
  <text x="1205" y="150" class="card">n</text>

  <!-- 班级-作业 -->
  <line x1="1020" y1="284" x2="1050" y2="342" class="line"/>
  <line x1="1170" y1="342" x2="1230" y2="342" class="line"/>
  <text x="1036" y="300" class="card">1</text>
  <text x="1205" y="330" class="card">n</text>

  <!-- 学生-测验 -->
  <line x1="980" y1="696" x2="1060" y2="696" class="line"/>
  <line x1="1180" y1="690" x2="1230" y2="690" class="line"/>
  <text x="1012" y="684" class="card">1</text>
  <text x="1208" y="678" class="card">n</text>

  <!-- 学生-互动 -->
  <line x1="980" y1="716" x2="1060" y2="840" class="line"/>
  <line x1="1180" y1="840" x2="1230" y2="840" class="line"/>
  <text x="1018" y="780" class="card">1</text>
  <text x="1208" y="828" class="card">n</text>

  <!-- 学生-预警 -->
  <line x1="900" y1="742" x2="920" y2="980" class="line"/>
  <line x1="1040" y1="980" x2="1110" y2="980" class="line"/>
  <text x="910" y="860" class="card">1</text>
  <text x="1090" y="968" class="card">n</text>
</svg>
