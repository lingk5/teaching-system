<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>预警中心 - 教学监督系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <script src="../js/config.js"></script>
    <script src="../js/request.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        try {
            if (typeof checkAuth === 'function') checkAuth();
        } catch (e) {
            console.error('Auth check failed:', e);
            window.location.href = 'login.html';
        }
    </script>

    <style>
        /* 保持原有样式不变 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f5f7fa;
        }
        
        .sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: 260px; background: #1e293b; color: white; overflow-y: auto; z-index: 1000; display: flex; flex-direction: column; }
        .sidebar-header { padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .sidebar-header h4 { margin: 0; font-size: 18px; display: flex; align-items: center; gap: 10px; }
        .sidebar-menu { padding: 15px 0; flex: 1; }
        .menu-item { padding: 12px 20px; display: flex; align-items: center; gap: 12px; color: rgba(255,255,255,0.7); text-decoration: none; transition: all 0.3s; border-left: 3px solid transparent; }
        .menu-item:hover { background: rgba(255,255,255,0.1); color: white; }
        .menu-item.active { background: rgba(102, 126, 234, 0.2); color: white; border-left-color: #667eea; }
        .sidebar-footer { padding: 20px; border-top: 1px solid rgba(255,255,255,0.1); }
        .user-info { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
        .avatar { width: 40px; height: 40px; background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .user-name { font-weight: 600; font-size: 14px; }
        .user-role { font-size: 12px; opacity: 0.7; }
        .btn-logout { width: 100%; padding: 8px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 6px; color: white; font-size: 13px; cursor: pointer; }
        .btn-logout:hover { background: rgba(255,255,255,0.2); }
        
        .main-content { margin-left: 260px; padding: 30px; min-height: 100vh; }
        .page-header { margin-bottom: 25px; }
        .page-header h2 { color: #1e293b; font-weight: 700; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; }
        .page-header p { color: #64748b; margin: 0; }
        
        .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 25px; }
        .stat-card { background: white; padding: 24px; border-radius: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); transition: all 0.2s; position: relative; overflow: hidden; cursor: pointer; border: 2px solid transparent; }
        .stat-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,0.12); }
        .stat-card.active { border-color: #3b82f6; background-color: #eff6ff; }
        .stat-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; }
        .stat-card.total::before { background: #3b82f6; }
        .stat-card.red::before { background: #dc2626; }
        .stat-card.orange::before { background: #ea580c; }
        .stat-card.resolved::before { background: #059669; }
        .stat-icon { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; margin-bottom: 16px; }
        .stat-card.total .stat-icon { background: #eff6ff; color: #3b82f6; }
        .stat-card.red .stat-icon { background: #fee2e2; color: #dc2626; }
        .stat-card.orange .stat-icon { background: #ffedd5; color: #ea580c; }
        .stat-card.resolved .stat-icon { background: #d1fae5; color: #059669; }
        .stat-number { font-size: 36px; font-weight: 700; color: #1e293b; line-height: 1; transition: all 0.3s; }
        .stat-label { color: #64748b; font-size: 14px; margin-top: 8px; }
        .stat-change { font-size: 12px; margin-top: 8px; display: flex; align-items: center; gap: 4px; }
        .stat-change.up { color: #059669; }

        .filter-bar { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        .filter-group { display: flex; gap: 10px; align-items: center; }
        .btn-filter { padding: 8px 20px; border-radius: 8px; border: 1px solid #e2e8f0; background: white; color: #475569; font-size: 14px; cursor: pointer; transition: all 0.2s; }
        .btn-filter:hover { background: #f8fafc; border-color: #cbd5e1; }
        .btn-filter.active { background: #3b82f6; color: white; border-color: #3b82f6; }
        .btn-refresh { padding: 8px 16px; border-radius: 8px; border: none; background: #eff6ff; color: #3b82f6; display: flex; align-items: center; gap: 6px; cursor: pointer; transition: all 0.2s; font-size: 14px; }
        .btn-refresh.spinning i { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .search-box { position: relative; width: 280px; }
        .search-box input { width: 100%; padding: 8px 16px 8px 40px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 14px; transition: all 0.2s; }
        .search-box i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #94a3b8; }

        .auto-refresh-switch { display: flex; align-items: center; gap: 8px; font-size: 14px; color: #475569; }
        .switch { position: relative; width: 44px; height: 24px; background: #cbd5e1; border-radius: 12px; cursor: pointer; transition: all 0.2s; }
        .switch.active { background: #3b82f6; }
        .switch::after { content: ''; position: absolute; top: 2px; left: 2px; width: 20px; height: 20px; background: white; border-radius: 50%; transition: all 0.2s; }
        .switch.active::after { left: 22px; }

        .warning-list { display: flex; flex-direction: column; gap: 20px; }
        .warning-card { background: white; border-radius: 16px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); border-left: 5px solid; transition: all 0.3s; }
        .warning-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.12); }
        .warning-card.red { border-left-color: #dc2626; }
        .warning-card.orange { border-left-color: #ea580c; }
        .warning-card.yellow { border-left-color: #d97706; }
        .warning-card.resolved { border-left-color: #059669; opacity: 0.8; background: #f8fafc; }
        
        .warning-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
        .student-info { display: flex; align-items: center; gap: 15px; }
        .student-avatar { width: 50px; height: 50px; border-radius: 50%; background: linear-gradient(135deg, #667eea, #764ba2); display: flex; align-items: center; justify-content: center; color: white; font-weight: 600; font-size: 20px; }
        .student-meta h4 { margin: 0 0 6px 0; color: #1e293b; font-size: 18px; font-weight: 600; display: flex; align-items: center; gap: 10px; }
        .warning-badge { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; }
        .badge-red { background: #fee2e2; color: #dc2626; }
        .badge-orange { background: #ffedd5; color: #ea580c; }
        .badge-yellow { background: #fef3c7; color: #d97706; }
        .badge-resolved { background: #d1fae5; color: #059669; }
        .badge-ignored { background: #e5e7eb; color: #6b7280; }
        .warning-time { color: #94a3b8; font-size: 13px; display: flex; align-items: center; gap: 6px; margin-top: 6px; }
        
        .warning-body { display: grid; grid-template-columns: 2fr 1fr; gap: 24px; }
        .risk-section h5 { color: #dc2626; font-size: 14px; font-weight: 600; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
        .risk-reason { color: #475569; line-height: 1.6; margin-bottom: 16px; }
        .metrics-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        .metric-box { background: #f8fafc; padding: 12px; border-radius: 10px; text-align: center; }
        .metric-value { font-size: 20px; font-weight: 700; color: #1e293b; }
        .metric-label { font-size: 12px; color: #64748b; margin-top: 4px; }
        
        .suggestion-section { background: #eff6ff; border-radius: 12px; padding: 20px; border-left: 4px solid #3b82f6; }
        .suggestion-section h5 { color: #3b82f6; font-size: 14px; font-weight: 600; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
        .suggestion-text { color: #475569; font-size: 14px; line-height: 1.6; }
        
        .warning-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
        .btn-process { padding: 8px 20px; border-radius: 8px; border: none; background: #3b82f6; color: white; font-size: 14px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 6px; }
        .btn-process:hover { background: #2563eb; }
        .btn-view { padding: 8px 20px; border-radius: 8px; border: 1px solid #e2e8f0; background: white; color: #475569; font-size: 14px; cursor: pointer; transition: all 0.2s; }
        .btn-view:hover { background: #f8fafc; border-color: #cbd5e1; }
        
        .empty-state { text-align: center; padding: 60px 20px; color: #94a3b8; background: white; border-radius: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .loading { text-align: center; padding: 40px; color: #64748b; background: white; border-radius: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        
        .pagination-container { display: flex; justify-content: center; align-items: center; gap: 20px; margin-top: 30px; }
        .pagination { display: flex; gap: 8px; list-style: none; }
        .page-item .page-link { padding: 8px 16px; border-radius: 8px; border: 1px solid #e2e8f0; background: white; color: #475569; text-decoration: none; cursor: pointer; }
        .page-item.active .page-link { background: #3b82f6; color: white; border-color: #3b82f6; }
        .page-item.disabled .page-link { opacity: 0.5; cursor: not-allowed; }
        
        .timeline { position: relative; padding-left: 30px; margin-top: 20px; }
        .timeline::before { content: ''; position: absolute; left: 10px; top: 0; bottom: 0; width: 2px; background: #e2e8f0; }
        .timeline-item { position: relative; margin-bottom: 20px; }
        .timeline-item::before { content: ''; position: absolute; left: -24px; top: 4px; width: 12px; height: 12px; background: #3b82f6; border-radius: 50%; border: 2px solid white; box-shadow: 0 0 0 2px #3b82f6; }
        .timeline-time { font-size: 12px; color: #94a3b8; margin-bottom: 4px; }
        .timeline-content { background: #f8fafc; padding: 12px; border-radius: 8px; }
        .timeline-title { font-weight: 600; color: #1e293b; margin-bottom: 4px; }
        .timeline-desc { color: #64748b; font-size: 14px; }
    </style>
</head>
<body>
    <!-- 侧边栏 -->
    <div class="sidebar">
        <div class="sidebar-header"><h4><i class="bi bi-mortarboard-fill"></i> 教学监督系统</h4></div>
        <div class="sidebar-menu">
            <a href="dashboard.html" class="menu-item" id="nav-dashboard"><i class="bi bi-speedometer2"></i> 仪表盘</a>
            <a href="courses.html" class="menu-item" id="nav-courses"><i class="bi bi-book"></i> 课程管理</a>
            <a href="users.html" class="menu-item" id="nav-users" data-role="admin-only"><i class="bi bi-person-gear"></i> 用户管理</a>
            <a href="students.html" class="menu-item" id="nav-students"><i class="bi bi-people"></i> 学生管理</a>
            <a href="data-import.html" class="menu-item" id="nav-import" data-role="import"><i class="bi bi-upload"></i> 数据导入</a>
            <a href="analytics.html" class="menu-item" id="nav-analytics"><i class="bi bi-graph-up"></i> 学情分析</a>
            <a href="warnings.html" class="menu-item active" id="nav-warnings"><i class="bi bi-exclamation-triangle"></i> 预警中心</a>
        </div>
        <div class="sidebar-footer">
            <div class="user-info">
                <div class="avatar"><i class="bi bi-person-fill"></i></div>
                <div><div id="userName" class="user-name">加载中...</div><div class="user-role">教师</div></div>
            </div>
            <button onclick="logout()" class="btn-logout"><i class="bi bi-box-arrow-right"></i> 退出登录</button>
        </div>
    </div>

    <!-- 主内容 -->
    <div class="main-content">
        <div class="page-header">
            <div>
                <h2><i class="bi bi-exclamation-triangle-fill text-warning"></i>预警中心</h2>
                <p>实时监控学生学习状态，及时干预异常情况</p>
            </div>
        </div>

        <!-- 统计卡片 -->
        <div class="stats-row">
            <div class="stat-card total" onclick="filterByCard('all')" id="card-all">
                <div class="stat-icon"><i class="bi bi-exclamation-circle-fill"></i></div>
                <div class="stat-number" id="stat-total">0</div>
                <div class="stat-label">待处理预警</div>
                <div class="stat-change up" id="change-total"><i class="bi bi-arrow-up-short"></i> 点击查看所有</div>
            </div>
            <div class="stat-card red" onclick="filterByCard('red')" id="card-red">
                <div class="stat-icon"><i class="bi bi-exclamation-triangle-fill"></i></div>
                <div class="stat-number" id="stat-red">0</div>
                <div class="stat-label">红色预警（高风险）</div>
                <div class="stat-change" id="change-red">点击筛选</div>
            </div>
            <div class="stat-card orange" onclick="filterByCard('orange')" id="card-orange">
                <div class="stat-icon"><i class="bi bi-exclamation-circle"></i></div>
                <div class="stat-number" id="stat-orange">0</div>
                <div class="stat-label">橙色预警（中风险）</div>
                <div class="stat-change" id="change-orange">点击筛选</div>
            </div>
            <div class="stat-card resolved" onclick="filterByCard('resolved')" id="card-resolved">
                <div class="stat-icon"><i class="bi bi-check-circle-fill"></i></div>
                <div class="stat-number" id="stat-resolved">0</div>
                <div class="stat-label">已处理</div>
                <div class="stat-change up" id="change-resolved"><i class="bi bi-check"></i> 点击查看历史</div>
            </div>
        </div>

        <!-- 筛选栏 -->
        <div class="filter-bar">
            <div class="filter-group">
                <label class="text-muted">课程：</label>
                <select class="form-select" style="width: 200px;" id="courseSelect" onchange="handleCourseChange()"></select>
                <label class="text-muted ms-3">班级：</label>
                <select class="form-select" style="width: 200px;" id="classSelect" onchange="handleClassChange()"></select>
            </div>

            <div class="filter-group">
                <button class="btn-filter active" onclick="filterWarnings('all')" id="filter-all">全部</button>
                <button class="btn-filter" onclick="filterWarnings('red')" id="filter-red" style="color: #dc2626; border-color: #fee2e2; background: #fee2e2;">红色预警</button>
                <button class="btn-filter" onclick="filterWarnings('orange')" id="filter-orange" style="color: #ea580c; border-color: #ffedd5; background: #ffedd5;">橙色预警</button>
                <button class="btn-filter" onclick="filterWarnings('yellow')" id="filter-yellow" style="color: #d97706; border-color: #fef3c7; background: #fef3c7;">黄色预警</button>
                <button class="btn-filter d-none" onclick="filterWarnings('resolved')" id="filter-resolved">已处理</button>
            </div>
            
            <div class="filter-group">
                <div class="search-box">
                    <i class="bi bi-search"></i>
                    <input type="text" id="searchInput" placeholder="搜索学生姓名或学号..." oninput="debounceSearch()">
                </div>
                
                <div class="auto-refresh-switch">
                    <span>自动刷新</span>
                    <div class="switch active" id="autoRefreshSwitch" onclick="toggleAutoRefresh()"></div>
                    <span id="refreshCountdown" style="font-size: 12px; color: #94a3b8; min-width: 40px;">30s</span>
                </div>
                
                <button class="btn-refresh" id="refreshBtn" onclick="manualRefresh()">
                    <i class="bi bi-arrow-clockwise"></i> 刷新
                </button>
            </div>
        </div>

        <!-- 列表容器 -->
        <div id="warningListContainer" class="warning-list">
            <div class="loading">
                <i class="bi bi-arrow-repeat spin" style="font-size: 24px; display: block; margin-bottom: 10px;"></i>
                正在加载预警数据...
            </div>
        </div>

        <!-- 分页 -->
        <div class="pagination-container" id="paginationContainer" style="display: none;">
            <span style="color: #64748b; font-size: 14px;">共 <span id="totalCount">0</span> 条记录</span>
            <ul class="pagination" id="pagination"></ul>
        </div>
    </div>

    <!-- 处理模态框 -->
    <div class="modal fade" id="processModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">处理预警</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="modalWarningInfo" class="mb-4"></div>
                    <form id="processForm">
                        <div class="mb-3">
                            <label class="form-label">处理方式</label>
                            <select class="form-select" id="processType" required>
                                <option value="">请选择处理方式</option>
                                <option value="talk">单独谈话</option>
                                <option value="notify">通知家长</option>
                                <option value="tutorial">安排辅导</option>
                                <option value="adjust">调整学习计划</option>
                                <option value="other">其他措施</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">处理详情</label>
                            <textarea class="form-control" id="processDetail" rows="4" placeholder="请记录具体的干预措施..." required></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">处理结果</label>
                            <select class="form-select" id="processResult" required>
                                <option value="resolved">已解决</option>
                                <option value="following">持续跟进</option>
                                <option value="escalated">已升级</option>
                                <option value="ignored">忽略/误报</option>
                            </select>
                        </div>
                    </form>
                    <div id="historySection" style="display: none;">
                        <hr><h6 class="mb-3"><i class="bi bi-clock-history"></i> 历史处理记录</h6>
                        <div class="timeline" id="historyTimeline"></div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" onclick="submitProcess()" data-role="manage">提交处理</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 详情模态框 -->
    <div class="modal fade" id="detailModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">预警详情</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="detailContent"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // 全局变量
        let currentFilter = 'all';
        let currentPage = 1;
        let pageSize = 10;
        let warningsData = [];
        let autoRefreshInterval = null;
        let countdownInterval = null;
        let countdownSeconds = 30;
        let currentWarningId = null;
        let allCourses = [];
        let searchTimeout; // 用于防抖

        document.addEventListener('DOMContentLoaded', function() {
            try {
                if (typeof checkAuth === 'function' && !checkAuth()) {
                    return;
                }
            } catch (e) {
                console.error('Auth check failed:', e);
                window.location.href = 'login.html';
                return;
            }
            loadUserInfo();
            loadInitialData();
            startAutoRefresh();
        });

        // 1. 筛选逻辑
        function filterByCard(level) {
            currentFilter = level;
            currentPage = 1;
            updateFilterButtonState(level);

            // 更新卡片选中状态
            document.querySelectorAll('.stat-card').forEach(card => card.classList.remove('active'));
            document.getElementById(`card-${level}`).classList.add('active');

            fetchWarnings();
        }

        function filterWarnings(level) {
            currentFilter = level;
            currentPage = 1;
            updateFilterButtonState(level);

            // 同步更新上方卡片状态
            document.querySelectorAll('.stat-card').forEach(card => card.classList.remove('active'));
            const cardId = level === 'resolved' ? 'card-resolved' : (level === 'all' ? 'card-all' : `card-${level}`);
            const card = document.getElementById(cardId);
            if(card) card.classList.add('active');

            fetchWarnings();
        }

        function updateFilterButtonState(level) {
            document.querySelectorAll('.btn-filter').forEach(btn => btn.classList.remove('active'));
            // 如果是 'resolved'，这里没有对应的显式按钮，但逻辑上是正确的
            const btn = document.getElementById(`filter-${level}`);
            if (btn) btn.classList.add('active');
        }

        // 2. 搜索防抖
        function debounceSearch() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                currentPage = 1;
                fetchWarnings();
            }, 500);
        }

        // 3. 刷新逻辑
        function manualRefresh() {
            const btn = document.getElementById('refreshBtn');
            btn.classList.add('spinning');
            fetchWarnings().finally(() => {
                setTimeout(() => btn.classList.remove('spinning'), 500);
            });
        }

        function toggleAutoRefresh() {
            const switchEl = document.getElementById('autoRefreshSwitch');
            const isActive = switchEl.classList.toggle('active');
            if (isActive) {
                startAutoRefresh();
            } else {
                stopAutoRefresh();
            }
        }

        function startAutoRefresh() {
            stopAutoRefresh(); // 先清除旧的
            countdownSeconds = 30;
            updateCountdown();

            // 倒计时计时器
            countdownInterval = setInterval(() => {
                countdownSeconds--;
                if (countdownSeconds <= 0) {
                    countdownSeconds = 30;
                    fetchWarnings(); // 倒计时结束触发刷新
                }
                updateCountdown();
            }, 1000);
        }

        function stopAutoRefresh() {
            if (countdownInterval) {
                clearInterval(countdownInterval);
                countdownInterval = null;
            }
            document.getElementById('refreshCountdown').textContent = '暂停';
        }

        function updateCountdown() {
            document.getElementById('refreshCountdown').textContent = countdownSeconds + 's';
        }

        // 4. 数据加载
        async function fetchWarnings() {
            const courseId = document.getElementById('courseSelect').value;
            const classId = document.getElementById('classSelect').value;
            if (!courseId || !classId) return;

            try {
                let statusParam = 'active';
                let levelParam = '';

                if (currentFilter === 'resolved') {
                    statusParam = 'processed';
                } else if (currentFilter === 'all') {
                    statusParam = 'active';
                } else {
                    statusParam = 'active';
                    levelParam = currentFilter;
                }

                const params = new URLSearchParams({
                    page: currentPage,
                    per_page: pageSize,
                    level: levelParam,
                    status: statusParam,
                    search: document.getElementById('searchInput').value,
                    course_id: courseId,
                    class_id: classId
                });

                console.log('Fetching warnings with params:', params.toString());

                const res = await request.get(`/warnings/?${params}`);
                warningsData = res.warnings || [];
                renderWarnings(warningsData);
                updateStats(res.stats || {});
                renderPagination(res.total || 0);

            } catch (error) {
                console.error('获取失败:', error);
            }
        }

        // ... (保持原有的 renderWarnings, updateStats, renderPagination 等渲染逻辑) ...
        // 为了完整性，我再补充一些关键的渲染函数，确保代码可直接运行

        function renderWarnings(warnings) {
            const container = document.getElementById('warningListContainer');
            if (!warnings.length) {
                container.innerHTML = '<div class="empty-state">暂无数据</div>';
                return;
            }
            // 使用之前的模板渲染逻辑
            const html = warnings.map(w => {
                const isResolved = w.status === 'processed' || w.status === 'ignored';
                const statusText = isResolved ? (w.status === 'ignored' ? '已忽略' : '已解决') : (w.level === 'red' ? '红色预警' : w.level === 'orange' ? '橙色预警' : '黄色预警');
                const badgeClass = isResolved ? 'badge-resolved' : `badge-${w.level || 'yellow'}`;
                
                return `
                <div class="warning-card ${w.level || 'yellow'} ${isResolved ? 'resolved' : ''}">
                    <div class="warning-header">
                        <div class="student-info">
                            <div class="student-avatar">${w.student_name.charAt(0)}</div>
                            <div class="student-meta">
                                <h4>${w.student_name} <span class="warning-badge ${badgeClass}">${statusText}</span></h4>
                                <div class="warning-time">${formatTime(w.created_at)} · ${w.student_no}</div>
                            </div>
                        </div>
                    </div>
                    <div class="warning-body">
                        <div class="risk-section">
                            <h5><i class="bi bi-exclamation-diamond-fill"></i> 原因</h5>
                            <div class="risk-reason">${w.reason}</div>
                            <div class="metrics-row">
                                <div class="metric-box"><div class="metric-value">${w.score || '-'}</div><div class="metric-label">综合分</div></div>
                                <div class="metric-box"><div class="metric-value">${w.attendance_rate || '-'}%</div><div class="metric-label">出勤</div></div>
                                <div class="metric-box"><div class="metric-value">${w.assignment_rate || '-'}%</div><div class="metric-label">作业</div></div>
                                <div class="metric-box"><div class="metric-value">${w.avg_score || '-'}</div><div class="metric-label">均分</div></div>
                            </div>
                        </div>
                        <div class="suggestion-section">
                            <h5>建议</h5>
                            <div class="suggestion-text">${w.suggestion}</div>
                        </div>
                    </div>
                    ${!isResolved ? `<div class="warning-actions">
                        <button class="btn-process" onclick="openProcessModal(${w.id})" data-role="manage">处理</button>
                    </div>` : ''}
                </div>`;
            }).join('');
            container.innerHTML = html;
        }

        function updateStats(stats) {
            document.getElementById('stat-total').textContent = stats.total_pending || 0;
            document.getElementById('stat-red').textContent = stats.red_count || 0;
            document.getElementById('stat-orange').textContent = stats.orange_count || 0;
            document.getElementById('stat-resolved').textContent = stats.resolved_count || 0;
            document.getElementById('totalCount').textContent = stats.total || 0;
        }

        function renderPagination(total) {
            const totalPages = Math.ceil(total / pageSize);
            const container = document.getElementById('paginationContainer');
            if (totalPages <= 1) { container.style.display = 'none'; return; }
            container.style.display = 'flex';
            document.getElementById('pagination').innerHTML = `
                <li class="page-item ${currentPage === 1 ? 'disabled' : ''}"><a class="page-link" onclick="changePage(${currentPage-1})">上一页</a></li>
                <li class="page-item active"><span class="page-link">${currentPage}</span></li>
                <li class="page-item ${currentPage === totalPages ? 'disabled' : ''}"><a class="page-link" onclick="changePage(${currentPage+1})">下一页</a></li>
            `;
        }

        function changePage(p) { if(p>0) { currentPage=p; fetchWarnings(); } }

        function formatTime(t) { return new Date(t).toLocaleDateString(); }

        // --- 初始化加载逻辑 ---
        async function loadInitialData() {
            try {
                const res = await request.get('/courses/');
                allCourses = res.data || [];
                const courseSelect = document.getElementById('courseSelect');
                courseSelect.innerHTML = '<option value="">请选择课程</option>';
                allCourses.forEach(c => {
                    courseSelect.innerHTML += `<option value="${c.id}">${c.name}</option>`;
                });
                if(allCourses.length > 0) {
                    courseSelect.value = allCourses[0].id;
                    handleCourseChange();
                }
            } catch(e) { console.error(e); }
        }

        function handleCourseChange() {
            const courseId = document.getElementById('courseSelect').value;
            const classSelect = document.getElementById('classSelect');
            classSelect.innerHTML = '<option value="">请选择班级</option>';
            if(courseId) {
                const course = allCourses.find(c => c.id == courseId);
                if(course && course.classes) {
                    course.classes.forEach(cls => {
                        classSelect.innerHTML += `<option value="${cls.id}">${cls.name}</option>`;
                    });
                    if(course.classes.length > 0) {
                        classSelect.value = course.classes[0].id;
                        fetchWarnings();
                    }
                }
            }
        }

        function handleClassChange() { fetchWarnings(); }

        function loadUserInfo() {
            try {
                const userInfoStr = localStorage.getItem('userInfo');
                const user = userInfoStr ? JSON.parse(userInfoStr) : {};
                document.getElementById('userName').textContent = user.name || user.username || '教师';
                if (typeof applyRoleUI === 'function') applyRoleUI();
            } catch (error) {
                console.error('加载用户信息失败:', error);
            }
        }
        function logout() { localStorage.clear(); window.location.href='login.html'; }

        // 处理相关逻辑保持不变
        async function openProcessModal(id) {
            currentWarningId = id;
            const w = warningsData.find(x => x.id === id);
            document.getElementById('modalWarningInfo').innerHTML = `<div class="alert alert-warning">${w.student_name}: ${w.reason}</div>`;
            new bootstrap.Modal(document.getElementById('processModal')).show();
        }

        async function submitProcess() {
            const data = {
                process_type: document.getElementById('processType').value,
                process_detail: document.getElementById('processDetail').value,
                process_result: document.getElementById('processResult').value
            };
            try {
                await request.post(`/warnings/${currentWarningId}/process`, data);
                bootstrap.Modal.getInstance(document.getElementById('processModal')).hide();
                fetchWarnings();
                alert('处理成功');
            } catch(e) { alert('失败'); }
        }
    </script>
</body>
</html>
