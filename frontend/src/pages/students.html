<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学生管理 - 教学监督系统</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <!-- 图表库 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- 全局配置和工具 -->
    <script src="../js/config.js"></script>
    <script src="../js/request.js"></script>
    <script src="../js/auth.js"></script>

    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: #f5f7fa; }
        
        .sidebar {
            position: fixed; left: 0; top: 0; bottom: 0; width: 260px;
            background: #1e293b; color: white; overflow-y: auto; z-index: 1000;
            display: flex; flex-direction: column;
        }
        .sidebar-header { padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .sidebar-header h4 { margin: 0; font-size: 18px; display: flex; align-items: center; gap: 10px; }
        .sidebar-menu { padding: 15px 0; flex: 1; }
        .menu-item {
            padding: 12px 20px; display: flex; align-items: center; gap: 12px;
            color: rgba(255,255,255,0.7); text-decoration: none; transition: all 0.3s;
            border-left: 3px solid transparent;
        }
        .menu-item:hover { background: rgba(255,255,255,0.1); color: white; }
        .menu-item.active { background: rgba(102, 126, 234, 0.2); color: white; border-left-color: #667eea; }
        .sidebar-footer { padding: 20px; border-top: 1px solid rgba(255,255,255,0.1); }
        .user-info { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
        .avatar { width: 40px; height: 40px; background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .user-name { font-weight: 600; font-size: 14px; }
        .user-role { font-size: 12px; opacity: 0.7; }
        .btn-logout { width: 100%; padding: 8px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 6px; color: white; font-size: 13px; cursor: pointer; }
        .btn-logout:hover { background: rgba(255,255,255,0.2); }
        
        .main-content { margin-left: 260px; padding: 30px; min-height: 100vh; }
        
        .page-header { margin-bottom: 25px; }
        .page-header h2 { color: #1e293b; font-weight: 700; margin-bottom: 8px; }
        .page-header p { color: #64748b; margin: 0; }
        
        .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 25px; }
        .stat-card {
            background: white; padding: 20px; border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .stat-card .icon {
            width: 48px; height: 48px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; margin-bottom: 12px;
        }
        .stat-card .number { font-size: 28px; font-weight: 700; color: #1e293b; }
        .stat-card .label { color: #64748b; font-size: 14px; margin-top: 4px; }
        
        .filter-bar {
            background: white; padding: 20px; border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 20px;
            display: flex; gap: 15px; align-items: center; flex-wrap: wrap;
        }
        .search-box { position: relative; flex: 1; min-width: 250px; }
        .search-box input {
            width: 100%; padding: 10px 15px 10px 40px; border: 1px solid #e2e8f0;
            border-radius: 8px; font-size: 14px;
        }
        .search-box i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #94a3b8; }
        
        .student-list {
            background: white; border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08); overflow: hidden;
        }
        .list-header {
            display: grid; grid-template-columns: 60px 2fr 1fr 1fr 120px 180px;
            padding: 15px 20px; background: #f8fafc; border-bottom: 1px solid #e2e8f0;
            font-weight: 600; color: #475569; font-size: 14px;
        }
        .student-item {
            display: grid; grid-template-columns: 60px 2fr 1fr 1fr 120px 180px;
            padding: 15px 20px; border-bottom: 1px solid #f1f5f9;
            align-items: center; transition: all 0.2s;
        }
        .student-item:hover { background: #f8fafc; }
        .student-item:last-child { border-bottom: none; }
        
        .student-avatar {
            width: 40px; height: 40px; border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: 600;
        }
        .student-info h6 { margin: 0; color: #1e293b; font-weight: 600; }
        .student-info small { color: #94a3b8; font-size: 12px; }
        .student-class { color: #64748b; font-size: 14px; }
        .student-score { font-weight: 600; color: #1e293b; }
        .score-high { color: #059669; }
        .score-medium { color: #d97706; }
        .score-low { color: #dc2626; }
        
        .warning-badge { padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: 500; }
        .badge-none { background: #d1fae5; color: #059669; }
        .badge-yellow { background: #fef3c7; color: #d97706; }
        .badge-orange { background: #ffedd5; color: #ea580c; }
        .badge-red { background: #fee2e2; color: #dc2626; }
        
        .action-btns {
            display: flex; gap: 8px;
        }
        .btn-action {
            padding: 4px 10px; border-radius: 6px; border: 1px solid #e2e8f0;
            background: white; color: #64748b; font-size: 12px;
            cursor: pointer; transition: all 0.2s;
        }
        .btn-action:hover { background: #f1f5f9; color: #1e293b; }
        .btn-view:hover { border-color: #3b82f6; color: #3b82f6; }
        .btn-edit:hover { border-color: #f59e0b; color: #f59e0b; }
        .btn-delete:hover { border-color: #ef4444; color: #ef4444; }
        
        .empty-state { text-align: center; padding: 60px 20px; color: #94a3b8; }
        .loading { text-align: center; padding: 40px; color: #64748b; }
        
        .pagination-bar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px; border-top: 1px solid #e2e8f0;
        }
        .page-info { color: #64748b; font-size: 14px; }
        .page-btns { display: flex; gap: 8px; }
        .page-btn {
            padding: 8px 12px; border: 1px solid #e2e8f0; background: white;
            border-radius: 6px; color: #64748b; cursor: pointer;
        }
        .page-btn:hover { background: #f8fafc; }
        .page-btn.active { background: #3b82f6; color: white; border-color: #3b82f6; }

        /* 模态框自定义样式 */
        .profile-header {
            display: flex; align-items: center; gap: 20px; margin-bottom: 24px;
        }
        .profile-avatar-lg {
            width: 80px; height: 80px; border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white; font-size: 32px; font-weight: bold;
            display: flex; align-items: center; justify-content: center;
        }
        .metric-cards {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 24px;
        }
        .metric-card {
            background: #f8fafc; padding: 15px; border-radius: 10px; text-align: center;
        }
        .metric-val { font-size: 24px; font-weight: bold; color: #1e293b; }
        .metric-lbl { font-size: 13px; color: #64748b; }
    </style>

    <script>
        // 路由守卫
        try {
            if (typeof checkAuth === 'function') checkAuth();
        } catch (e) {
            console.error('Auth check failed:', e);
            window.location.href = 'login.html';
        }
    </script>
</head>
<body>
    <!-- 统一侧边栏 -->
    <div class="sidebar">
        <div class="sidebar-header">
            <h4><i class="bi bi-mortarboard-fill"></i> 教学监督系统</h4>
        </div>
        
        <div class="sidebar-menu">
            <a href="dashboard.html" class="menu-item" id="nav-dashboard">
                <i class="bi bi-speedometer2"></i> 仪表盘
            </a>
            <a href="courses.html" class="menu-item" id="nav-courses">
                <i class="bi bi-book"></i> 课程管理
            </a>
            <a href="users.html" class="menu-item" id="nav-users" data-capability="manage_users">
                <i class="bi bi-person-gear"></i> 用户管理
            </a>
            <a href="students.html" class="menu-item active" id="nav-students">
                <i class="bi bi-people"></i> 学生管理
            </a>
            <a href="data-import.html" class="menu-item" id="nav-import">
                <i class="bi bi-upload"></i> 数据导入
            </a>
            <a href="analytics.html" class="menu-item"  id="nav-analytics">
                <i class="bi bi-graph-up"></i> 学情分析
            </a>
            <a href="warnings.html" class="menu-item" id="nav-warnings">
                <i class="bi bi-exclamation-triangle"></i> 预警中心
            </a>
        </div>
        
        <div class="sidebar-footer">
            <div class="user-info">
                <div class="avatar"><i class="bi bi-person-fill"></i></div>
                <div>
                    <div id="userName" class="user-name">加载中...</div>
                    <div id="userRole" class="user-role">加载中...</div>
                </div>
            </div>
            <button onclick="logout()" class="btn-logout">
                <i class="bi bi-box-arrow-right"></i> 退出登录
            </button>
        </div>
    </div>

    <!-- 主内容 -->
    <div class="main-content">
        <div class="page-header">
            <h2><i class="bi bi-people me-2 text-primary"></i>学生管理</h2>
            <p>查看和管理班级学生信息及学习状态</p>
        </div>

        <!-- 统计卡片 -->
        <div class="stats-row">
            <div class="stat-card">
                <div class="icon" style="background: #dbeafe; color: #1e40af;">
                    <i class="bi bi-people-fill"></i>
                </div>
                <div class="number" id="totalStudents">-</div>
                <div class="label">学生总数</div>
            </div>
            <div class="stat-card">
                <div class="icon" style="background: #d1fae5; color: #059669;">
                    <i class="bi bi-check-circle-fill"></i>
                </div>
                <div class="number" id="goodStudents">-</div>
                <div class="label">状态良好</div>
            </div>
            <div class="stat-card">
                <div class="icon" style="background: #fef3c7; color: #d97706;">
                    <i class="bi bi-exclamation-circle-fill"></i>
                </div>
                <div class="number" id="warningStudents">-</div>
                <div class="label">需要关注</div>
            </div>
            <div class="stat-card">
                <div class="icon" style="background: #fee2e2; color: #dc2626;">
                    <i class="bi bi-exclamation-triangle-fill"></i>
                </div>
                <div class="number" id="dangerStudents">-</div>
                <div class="label">高风险</div>
            </div>
        </div>

        <!-- 搜索筛选 -->
        <div class="filter-bar">
            <div class="search-box">
                <i class="bi bi-search"></i>
                <input type="text" id="searchInput" placeholder="搜索学生姓名或学号..." onkeyup="searchStudents()">
            </div>
            <select class="form-select" style="width: 200px;" id="courseFilter" onchange="handleCourseChange()">
                <option value="">请先选择课程</option>
            </select>
            <select class="form-select" style="width: 200px;" id="classFilter" onchange="handleClassChange()">
                <option value="">请先选择班级</option>
            </select>
            <button class="btn btn-primary" data-capability="manage_students" onclick="showAddStudentModal()">
                <i class="bi bi-plus-circle me-1"></i>添加学生
            </button>
        </div>

        <!-- 学生列表 -->
        <div class="student-list">
            <div class="list-header">
                <div>头像</div>
                <div>学生信息</div>
                <div>所在班级</div>
                <div>综合评分</div>
                <div>预警状态</div>
                <div>操作</div>
            </div>
            <div id="studentListBody">
                <div class="loading">
                    <div class="spinner-border text-primary" role="status"></div>
                    <p class="mt-2">加载学生数据中...</p>
                </div>
            </div>
        </div>

        <!-- 分页 -->
        <div class="pagination-bar">
            <div class="page-info">显示 <span id="startNum">1</span>-<span id="endNum">10</span> 共 <span id="totalNum">0</span> 名学生</div>
            <div class="page-btns" id="pagination">
                <button class="page-btn" onclick="changePage(-1)"><i class="bi bi-chevron-left"></i></button>
                <button class="page-btn active">1</button>
                <button class="page-btn" onclick="changePage(1)"><i class="bi bi-chevron-right"></i></button>
            </div>
        </div>
    </div>

    <!-- 添加学生模态框 -->
    <div class="modal fade" id="addStudentModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">添加学生</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="addStudentForm">
                        <div class="mb-3">
                            <label class="form-label">学号 <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="studentNo" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">姓名 <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="studentName" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">性别</label>
                            <select class="form-select" id="gender">
                                <option value="">请选择</option>
                                <option value="男">男</option>
                                <option value="女">女</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">班级</label>
                            <select class="form-select" id="modalClassId" required>
                                <option value="">请选择班级</option>
                            </select>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" data-capability="manage_students" onclick="addStudent()">添加</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 编辑学生模态框 -->
    <div class="modal fade" id="editStudentModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">编辑学生信息</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="editStudentForm">
                        <input type="hidden" id="editStudentId">
                        <div class="mb-3">
                            <label class="form-label">学号 <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="editStudentNo" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">姓名 <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="editStudentName" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">性别</label>
                            <select class="form-select" id="editGender">
                                <option value="">请选择</option>
                                <option value="男">男</option>
                                <option value="女">女</option>
                            </select>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" data-capability="manage_students" onclick="updateStudent()">保存修改</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 学生详情模态框 -->
    <div class="modal fade" id="studentDetailModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">学生个人档案</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="detailModalBody">
                    <!-- 动态内容 -->
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // 全局变量
        let allStudents = [];
        let allCourses = [];
        let currentPage = 1;
        const pageSize = 10;

        document.addEventListener('DOMContentLoaded', () => {
            loadUserInfo();
            loadInitialData();
        });

        function loadUserInfo() {
            loadUserInfoToUI(); // 使用统一的用户信息加载函数
        }

        async function loadInitialData() {
            try {
                const res = await request.get('/courses/');
                allCourses = res.data || [];
                populateCourseFilter();

                if (allCourses.length > 0) {
                    const firstCourse = allCourses[0];
                    document.getElementById('courseFilter').value = firstCourse.id;
                    handleCourseChange(firstCourse.id);

                    if (firstCourse.classes && firstCourse.classes.length > 0) {
                        const firstClass = firstCourse.classes[0];
                        document.getElementById('classFilter').value = firstClass.id;
                        await loadStudents(firstCourse.id, firstClass.id);
                    } else {
                         renderStudents();
                    }
                } else {
                    renderEmpty();
                }
            } catch (error) {
                console.error('初始化失败:', error);
                document.getElementById('studentListBody').innerHTML = `<div class="alert alert-danger">数据加载失败: ${error.message}</div>`;
            }
        }

        async function loadStudents(courseId, classId) {
            const container = document.getElementById('studentListBody');
            container.innerHTML = '<div class="loading"><div class="spinner-border text-primary" role="status"></div><p class="mt-2">加载中...</p></div>';

            try {
                const res = await request.get(`/courses/${courseId}/classes/${classId}/students`);
                allStudents = res.data || [];
                currentPage = 1;
                updateStats();
                renderStudents();
            } catch (error) {
                console.error('加载学生失败:', error);
                container.innerHTML = `<div class="alert alert-danger">加载失败: ${error.message}</div>`;
            }
        }

        function renderStudents() {
            const container = document.getElementById('studentListBody');
            const start = (currentPage - 1) * pageSize;
            const end = start + pageSize;
            const pageData = allStudents.slice(start, end);

            document.getElementById('startNum').textContent = allStudents.length > 0 ? start + 1 : 0;
            document.getElementById('endNum').textContent = Math.min(end, allStudents.length);
            document.getElementById('totalNum').textContent = allStudents.length;

            if (pageData.length === 0) {
                renderEmpty();
                return;
            }
            
            const html = pageData.map(s => {
                const score = s.score !== undefined ? s.score : '-';
                const warningLevel = s.warning_level || null;
                
                let badgeClass = 'badge-none';
                let badgeText = '正常';
                if (warningLevel === 'red') { badgeClass = 'badge-red'; badgeText = '红色预警'; }
                else if (warningLevel === 'orange') { badgeClass = 'badge-orange'; badgeText = '橙色预警'; }
                else if (warningLevel === 'yellow') { badgeClass = 'badge-yellow'; badgeText = '黄色预警'; }
                
                return `
                    <div class="student-item">
                        <div><div class="student-avatar">${s.name.charAt(0)}</div></div>
                        <div class="student-info">
                            <h6>${s.name}</h6>
                            <small>学号：${s.student_no}</small>
                        </div>
                        <div class="student-class">${s.class_name || '当前班级'}</div>
                        <div class="student-score">${score}</div>
                        <div><span class="warning-badge ${badgeClass}">${badgeText}</span></div>
                        <div class="action-btns">
                            <button class="btn-action btn-view" onclick="viewStudent(${s.id})">详情</button>
                            <button class="btn-action btn-edit" data-capability="manage_students" onclick="editStudent(${s.id})">编辑</button>
                            <button class="btn-action btn-delete" data-capability="manage_students" onclick="deleteStudent(${s.id})">删除</button>
                        </div>
                    </div>
                `;
            }).join('');
            
            container.innerHTML = html;
            if (typeof applyRoleUI === 'function') {
                applyRoleUI();
            }
        }

        function renderEmpty() {
            document.getElementById('studentListBody').innerHTML = `
                <div class="empty-state">
                    <i class="bi bi-inbox" style="font-size: 48px;"></i>
                    <h5>暂无学生数据</h5>
                    <p>请选择班级或添加学生</p>
                </div>
            `;
        }

        function populateCourseFilter() {
            const select = document.getElementById('courseFilter');
            select.innerHTML = '<option value="">请选择课程</option>';
            allCourses.forEach(c => {
                select.innerHTML += `<option value="${c.id}">${c.name}</option>`;
            });
        }

        function handleCourseChange(courseId) {
            const id = courseId || document.getElementById('courseFilter').value;
            const classSelect = document.getElementById('classFilter');
            classSelect.innerHTML = '<option value="">请选择班级</option>';

            if (id) {
                const course = allCourses.find(c => c.id == id);
                if (course && course.classes) {
                    course.classes.forEach(cls => {
                        classSelect.innerHTML += `<option value="${cls.id}">${cls.name}</option>`;
                    });
                }
            }
            allStudents = [];
            renderStudents();
        }

        function handleClassChange() {
            const courseId = document.getElementById('courseFilter').value;
            const classId = document.getElementById('classFilter').value;
            if (courseId && classId) {
                loadStudents(courseId, classId);
            }
        }

        function searchStudents() {
            const val = document.getElementById('searchInput').value.toLowerCase();
            if (!val) {
                renderStudents(); // 恢复当前页
                return;
            }
            
            // 简单的内存搜索
            const filtered = allStudents.filter(s =>
                s.name.toLowerCase().includes(val) ||
                s.student_no.includes(val)
            );
            
            const container = document.getElementById('studentListBody');
            if (filtered.length === 0) {
                container.innerHTML = '<div class="empty-state">没有找到匹配的学生</div>';
                return;
            }

            // 复用渲染逻辑（临时覆盖 allStudents，注意这里是 hack 写法，正式应调用后端 search）
            // 这里为了简单，手动拼接 HTML
            const html = filtered.map(s => {
                // ... 重复的 map 逻辑 ...
                const score = s.score !== undefined ? s.score : '-';
                const warningLevel = s.warning_level || null;
                let badgeClass = 'badge-none';
                let badgeText = '正常';
                if (warningLevel === 'red') { badgeClass = 'badge-red'; badgeText = '红色预警'; }
                else if (warningLevel === 'orange') { badgeClass = 'badge-orange'; badgeText = '橙色预警'; }
                else if (warningLevel === 'yellow') { badgeClass = 'badge-yellow'; badgeText = '黄色预警'; }

                return `
                    <div class="student-item">
                        <div><div class="student-avatar">${s.name.charAt(0)}</div></div>
                        <div class="student-info">
                            <h6>${s.name}</h6>
                            <small>学号：${s.student_no}</small>
                        </div>
                        <div class="student-class">${s.class_name || '当前班级'}</div>
                        <div class="student-score">${score}</div>
                        <div><span class="warning-badge ${badgeClass}">${badgeText}</span></div>
                        <div class="action-btns">
                            <button class="btn-action btn-view" onclick="viewStudent(${s.id})">详情</button>
                            <button class="btn-action btn-edit" data-capability="manage_students" onclick="editStudent(${s.id})">编辑</button>
                            <button class="btn-action btn-delete" data-capability="manage_students" onclick="deleteStudent(${s.id})">删除</button>
                        </div>
                    </div>
                `;
            }).join('');
            container.innerHTML = html;
            if (typeof applyRoleUI === 'function') {
                applyRoleUI();
            }
        }

        function updateStats() {
            const total = allStudents.length;
            const good = allStudents.filter(s => !s.warning_level).length;
            const warning = allStudents.filter(s => s.warning_level === 'yellow').length;
            const danger = allStudents.filter(s => s.warning_level === 'red' || s.warning_level === 'orange').length;

            document.getElementById('totalStudents').textContent = total;
            document.getElementById('goodStudents').textContent = good;
            document.getElementById('warningStudents').textContent = warning;
            document.getElementById('dangerStudents').textContent = danger;
            document.getElementById('totalNum').textContent = total;
        }

        function changePage(delta) {
            const maxPage = Math.ceil(allStudents.length / pageSize) || 1;
            currentPage += delta;
            if (currentPage < 1) currentPage = 1;
            if (currentPage > maxPage) currentPage = maxPage;
            renderStudents();
        }

        function showAddStudentModal() {
            const courseId = document.getElementById('courseFilter').value;
            if (!courseId) {
                alert('请先选择一个课程');
                return;
            }

            const modalClassSelect = document.getElementById('modalClassId');
            modalClassSelect.innerHTML = '<option value="">请选择班级</option>';

            const course = allCourses.find(c => c.id == courseId);
            if (course && course.classes) {
                course.classes.forEach(cls => {
                    modalClassSelect.innerHTML += `<option value="${cls.id}">${cls.name}</option>`;
                });
            }

            new bootstrap.Modal(document.getElementById('addStudentModal')).show();
        }

        async function addStudent() {
            const studentNo = document.getElementById('studentNo').value.trim();
            const name = document.getElementById('studentName').value.trim();
            const gender = document.getElementById('gender').value;
            const classId = document.getElementById('modalClassId').value;
            const courseId = document.getElementById('courseFilter').value;

            if (!studentNo || !name || !classId) {
                alert('请填写必填项');
                return;
            }

            try {
                await request.post(`/courses/${courseId}/classes/${classId}/students`, {
                    student_no: studentNo,
                    name: name,
                    gender: gender
                });

                alert('添加成功');
                bootstrap.Modal.getInstance(document.getElementById('addStudentModal')).hide();
                document.getElementById('addStudentForm').reset();
                loadStudents(courseId, classId);

            } catch (error) {
                alert('添加失败: ' + error.message);
            }
        }

        // --- 编辑逻辑 ---
        function editStudent(id) {
            const student = allStudents.find(s => s.id === id);
            if (!student) return;

            document.getElementById('editStudentId').value = student.id;
            document.getElementById('editStudentNo').value = student.student_no;
            document.getElementById('editStudentName').value = student.name;
            document.getElementById('editGender').value = student.gender;

            new bootstrap.Modal(document.getElementById('editStudentModal')).show();
        }

        async function updateStudent() {
            const id = document.getElementById('editStudentId').value;
            const studentNo = document.getElementById('editStudentNo').value.trim();
            const name = document.getElementById('editStudentName').value.trim();
            const gender = document.getElementById('editGender').value;

            if (!studentNo || !name) {
                alert('请填写必填项');
                return;
            }

            try {
                await request.put(`/courses/students/${id}`, {
                    student_no: studentNo,
                    name: name,
                    gender: gender
                });

                alert('修改成功');
                bootstrap.Modal.getInstance(document.getElementById('editStudentModal')).hide();

                // 刷新列表 (重新获取)
                const courseId = document.getElementById('courseFilter').value;
                const classId = document.getElementById('classFilter').value;
                loadStudents(courseId, classId);

            } catch (error) {
                alert('修改失败: ' + error.message);
            }
        }

        // --- 删除逻辑 ---
        async function deleteStudent(id) {
            if (!confirm('确定要删除该学生吗？此操作不可恢复！')) return;

            try {
                await request.delete(`/courses/students/${id}`);
                alert('删除成功');

                // 刷新列表
                const courseId = document.getElementById('courseFilter').value;
                const classId = document.getElementById('classFilter').value;
                loadStudents(courseId, classId);

            } catch (error) {
                alert('删除失败: ' + error.message);
            }
        }

        // --- 查看详情 ---
        async function viewStudent(studentId) {
            const courseId = document.getElementById('courseFilter').value;
            if (!courseId) return;

            try {
                const res = await request.get(`/analytics/course/${courseId}/students/${studentId}/profile`);
                const data = res.data;
                const s = data.student;
                const metrics = data.metrics || {};
                const coverage = data.coverage || {};
                const metricValue = (value, suffix = '') => value == null ? '暂无' : `${value}${suffix}`;
                const radarMetrics = [
                    metrics.attendance ?? 0,
                    metrics.homework ?? 0,
                    metrics.quiz ?? 0,
                    metrics.interaction ?? 0,
                    s.score ?? 0
                ];

                const modalBody = document.getElementById('detailModalBody');
                modalBody.innerHTML = `
                    <div class="profile-header">
                        <div class="profile-avatar-lg">${s.name.charAt(0)}</div>
                        <div>
                            <h4 class="mb-1">${s.name}</h4>
                            <div class="text-muted">学号：${s.student_no} · ${s.class_name || '班级未知'}</div>
                            <div class="mt-2">
                                <span class="badge bg-primary">综合评分：${s.score}</span>
                            </div>
                        </div>
                    </div>

                    <div class="metric-cards">
                        <div class="metric-card">
                            <div class="metric-val text-success">${metricValue(metrics.attendance, '%')}</div>
                            <div class="metric-lbl">出勤率</div>
                        </div>
                        <div class="metric-card">
                            <div class="metric-val text-primary">${metricValue(metrics.homework)}</div>
                            <div class="metric-lbl">作业得分</div>
                        </div>
                        <div class="metric-card">
                            <div class="metric-val text-warning">${metricValue(metrics.quiz)}</div>
                            <div class="metric-lbl">测验得分</div>
                        </div>
                        <div class="metric-card">
                            <div class="metric-val text-purple" style="color: #8b5cf6;">${metricValue(metrics.interaction)}</div>
                            <div class="metric-lbl">互动得分</div>
                        </div>
                    </div>

                    <div class="alert alert-light border mb-4">
                        <div class="fw-semibold mb-2">覆盖率</div>
                        <div class="small text-muted">已覆盖 ${coverage.covered_count ?? 0}/${coverage.total_count ?? 4} 项</div>
                        <div class="small text-muted mt-1">已覆盖指标：${(coverage.covered_fields || []).join('、') || '无'}</div>
                        <div class="small text-muted mt-1">缺失指标：${(coverage.missing_fields || []).join('、') || '无'}</div>
                    </div>

                    <div class="row">
                        <div class="col-md-6">
                            <h6 class="mb-3 border-bottom pb-2">能力雷达</h6>
                            <canvas id="detailRadar" height="250"></canvas>
                        </div>
                        <div class="col-md-6">
                            <h6 class="mb-3 border-bottom pb-2">成绩走势</h6>
                            <canvas id="detailTrend" height="250"></canvas>
                        </div>
                    </div>
                `;

                new bootstrap.Modal(document.getElementById('studentDetailModal')).show();

                setTimeout(() => {
                    new Chart(document.getElementById('detailRadar'), {
                        type: 'radar',
                        data: {
                            labels: ['出勤', '作业', '测验', '互动', '综合'],
                            datasets: [{
                                label: '个人能力',
                                data: radarMetrics,
                                backgroundColor: 'rgba(59, 130, 246, 0.2)',
                                borderColor: '#3b82f6'
                            }]
                        },
                        options: { scales: { r: { beginAtZero: true, max: 100 } } }
                    });

                    new Chart(document.getElementById('detailTrend'), {
                        type: 'line',
                        data: {
                            labels: data.trend.labels,
                            datasets: [{
                                label: '测验成绩',
                                data: data.trend.scores,
                                borderColor: '#10b981',
                                tension: 0.4
                            }]
                        },
                        options: { scales: { y: { beginAtZero: false, min: 0, max: 100 } } }
                    });
                }, 200);

            } catch (error) {
                console.error('加载详情失败:', error);
                alert('无法加载学生详情');
            }
        }

        function logout() {
            if(confirm('确定退出登录？')) {
                localStorage.clear();
                window.location.href = 'login.html';
            }
        }
    </script>
</body>
</html>
