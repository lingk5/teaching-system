<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 教学监督系统</title>
    <!-- 引入基础样式 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <!-- 引入全局配置和工具 -->
    <script src="../js/config.js"></script>
    <script src="../js/request.js"></script>

    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        .login-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo-icon {
            width: 80px; height: 80px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 15px; color: white; font-size: 40px;
        }
        .btn-login {
            width: 100%; padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none; border-radius: 10px; color: white;
            font-size: 16px; font-weight: 600;
            transition: all 0.3s;
        }
        .btn-login:hover { opacity: 0.9; transform: translateY(-2px); }
        .btn-login:disabled { opacity: 0.7; cursor: not-allowed; }
        .error-msg {
            background: #fee2e2; color: #dc2626;
            padding: 12px; border-radius: 8px;
            margin-bottom: 20px; display: none;
            font-size: 14px;
        }
        .demo-accounts {
            margin-top: 30px; padding-top: 20px;
            border-top: 1px solid #e5e7eb;
            text-align: center; color: #6b7280; font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">
            <div class="logo-icon"><i class="bi bi-mortarboard-fill"></i></div>
            <h2>教学监督系统</h2>
            <p class="text-muted">教师端登录</p>
        </div>

        <div id="loginError" class="error-msg"></div>

        <form id="loginForm" onsubmit="return false;">
            <div class="form-floating mb-3">
                <input type="text" class="form-control" id="username" placeholder="teacher" value="teacher" required>
                <label>用户名</label>
            </div>
            <div class="form-floating mb-3">
                <input type="password" class="form-control" id="password" placeholder="123456" value="123456" required>
                <label>密码</label>
            </div>
            <button type="submit" class="btn-login" id="loginBtn" onclick="login()">登 录</button>
        </form>

        <div class="demo-accounts">
            <div style="margin-bottom: 8px;"><i class="bi bi-info-circle"></i> 演示账号：</div>
            <div style="background: #f3f4f6; padding: 10px; border-radius: 8px; text-align: left; font-size: 12px;">
                <div style="margin-bottom: 4px;"><strong>教师:</strong> teacher / 123456</div>
                <div style="margin-bottom: 4px;"><strong>助教:</strong> assistant / 123456</div>
                <div><strong>管理员:</strong> admin / 123456</div>
            </div>
        </div>
    </div>

    <script>
        function getHomePageByRole(role) {
            const normalized = (role || 'teacher').toLowerCase();
            if (normalized === 'assistant') return 'analytics.html';
            return 'dashboard.html';
        }

        // 页面加载逻辑
        document.addEventListener('DOMContentLoaded', () => {
            // 如果已有 token，自动跳转
            if (localStorage.getItem('token')) {
                try {
                    const user = JSON.parse(localStorage.getItem('userInfo') || '{}');
                    window.location.href = getHomePageByRole(user.role);
                } catch (e) {
                    window.location.href = 'dashboard.html';
                }
            }
        });

        // 登录逻辑
        async function login() {
            const usernameInput = document.getElementById('username');
            const passwordInput = document.getElementById('password');
            const errorEl = document.getElementById('loginError');
            const btn = document.getElementById('loginBtn');

            const username = usernameInput.value.trim();
            const password = passwordInput.value.trim();

            // 1. 基础验证
            if (!username || !password) {
                showError('请输入用户名和密码');
                return;
            }

            // 2. UI 状态更新
            errorEl.style.display = 'none';
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>登录中...';

            try {
                // 3. 发起请求 (使用 request.post)
                const response = await request.post('/auth/login', { username, password });
                
                // 4. 成功处理 (后端返回格式: { success: true, message: '...', data: { token: '...', user: {...} } })
                if (response.success && response.data && response.data.token) {
                    localStorage.setItem('token', response.data.token);
                    localStorage.setItem('userInfo', JSON.stringify(response.data.user));
                    
                    // 按角色跳转
                    window.location.href = getHomePageByRole(response.data.user.role);
                } else {
                    throw new Error('登录响应格式错误，未找到Token');
                }

            } catch (error) {
                // 5. 错误处理
                console.error('登录失败:', error);
                showError(error.message || '登录失败，请检查用户名和密码');
            } finally {
                btn.disabled = false;
                btn.textContent = '登 录';
            }
        }

        function showError(msg) {
            const el = document.getElementById('loginError');
            el.textContent = msg;
            el.style.display = 'block';
        }

        // 回车监听
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') login();
        });
    </script>
</body>
</html>
