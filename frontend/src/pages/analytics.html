<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学情分析 - 教学监督系统</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <!-- 全局配置和工具 -->
    <script src="../js/config.js"></script>
    <script src="../js/request.js"></script>
    <script src="../js/auth.js"></script>

    <!-- 图表库 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: #f5f7fa; }
        
        .sidebar {
            position: fixed; left: 0; top: 0; bottom: 0; width: 260px;
            background: #1e293b; color: white; overflow-y: auto; z-index: 1000;
            display: flex; flex-direction: column;
        }
        .sidebar-header { padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .sidebar-header h4 { margin: 0; font-size: 18px; display: flex; align-items: center; gap: 10px; }
        .sidebar-menu { padding: 15px 0; flex: 1; }
        .menu-item {
            padding: 12px 20px; display: flex; align-items: center; gap: 12px;
            color: rgba(255,255,255,0.7); text-decoration: none; transition: all 0.3s;
            border-left: 3px solid transparent;
        }
        .menu-item:hover { background: rgba(255,255,255,0.1); color: white; }
        .menu-item.active { background: rgba(102, 126, 234, 0.2); color: white; border-left-color: #667eea; }
        .sidebar-footer { padding: 20px; border-top: 1px solid rgba(255,255,255,0.1); }
        .user-info { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
        .avatar { width: 40px; height: 40px; background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .user-name { font-weight: 600; font-size: 14px; }
        .user-role { font-size: 12px; opacity: 0.7; }
        .btn-logout { width: 100%; padding: 8px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 6px; color: white; font-size: 13px; cursor: pointer; }
        .btn-logout:hover { background: rgba(255,255,255,0.2); }
        
        .main-content { margin-left: 260px; padding: 30px; min-height: 100vh; }
        .page-header { margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; }
        .page-header h2 { color: #1e293b; font-weight: 700; margin: 0; }
        
        .filter-bar {
            background: white; padding: 15px 20px; border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 25px;
            display: flex; gap: 15px; align-items: center;
        }
        
        .chart-card {
            background: white; border-radius: 16px; padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 24px;
        }
        .chart-title {
            font-size: 16px; font-weight: 600; color: #1e293b;
            margin-bottom: 20px; display: flex; align-items: center; gap: 8px;
        }
        .chart-container { position: relative; height: 300px; }
        
        .student-list {
            background: white; border-radius: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08); overflow: hidden;
        }
        .list-header {
            display: grid; grid-template-columns: 60px 2fr 1fr 1fr 100px;
            padding: 15px 20px; background: #f8fafc;
            font-weight: 600; color: #475569; font-size: 14px;
        }
        .student-item {
            display: grid; grid-template-columns: 60px 2fr 1fr 1fr 100px;
            padding: 12px 20px; border-top: 1px solid #f1f5f9;
            align-items: center; cursor: pointer; transition: all 0.2s;
        }
        .student-item:hover { background: #f8fafc; }
        .student-avatar {
            width: 40px; height: 40px; border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: 600;
        }
        .student-info h6 { margin: 0; color: #1e293b; font-weight: 600; }
        .student-info small { color: #94a3b8; }
        .score-tag {
            padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 500;
        }
        .tag-excellent { background: #d1fae5; color: #059669; }
        .tag-good { background: #dbeafe; color: #1e40af; }
        .tag-average { background: #fef3c7; color: #d97706; }
        .tag-poor { background: #fee2e2; color: #dc2626; }
        
        /* 个人详情弹窗 */
        .modal-body .student-profile {
            display: flex; align-items: center; gap: 20px; margin-bottom: 24px;
        }
        .modal-body .profile-avatar {
            width: 80px; height: 80px; border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 32px; font-weight: 600;
        }
        .profile-info h4 { margin: 0 0 8px 0; color: #1e293b; }
        .profile-info p { margin: 0; color: #64748b; }
        .metric-grid {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px;
        }
        .metric-item {
            background: #f8fafc; padding: 16px; border-radius: 12px; text-align: center;
        }
        .metric-value { font-size: 24px; font-weight: 700; color: #1e293b; }
        .metric-label { font-size: 13px; color: #64748b; margin-top: 4px; }
    </style>

    <script>
        // 路由守卫
        try {
            if (typeof checkAuth === 'function') checkAuth();
        } catch (e) {
            console.error('Auth check failed:', e);
            window.location.href = 'login.html';
        }
    </script>
</head>
<body>
    <!-- 统一侧边栏 -->
    <div class="sidebar">
        <div class="sidebar-header">
            <h4><i class="bi bi-mortarboard-fill"></i> 教学监督系统</h4>
        </div>
        
        <div class="sidebar-menu">
            <a href="dashboard.html" class="menu-item" id="nav-dashboard">
                <i class="bi bi-speedometer2"></i> 仪表盘
            </a>
            <a href="courses.html" class="menu-item" id="nav-courses">
                <i class="bi bi-book"></i> 课程管理
            </a>
            <a href="users.html" class="menu-item" id="nav-users" data-capability="manage_users">
                <i class="bi bi-person-gear"></i> 用户管理
            </a>
            <a href="students.html" class="menu-item" id="nav-students">
                <i class="bi bi-people"></i> 学生管理
            </a>
            <a href="data-import.html" class="menu-item" id="nav-import">
                <i class="bi bi-upload"></i> 数据导入
            </a>
            <a href="analytics.html" class="menu-item active" id="nav-analytics">
                <i class="bi bi-graph-up"></i> 学情分析
            </a>
            <a href="warnings.html" class="menu-item" id="nav-warnings">
                <i class="bi bi-exclamation-triangle"></i> 预警中心
            </a>
        </div>
        
        <div class="sidebar-footer">
            <div class="user-info">
                <div class="avatar"><i class="bi bi-person-fill"></i></div>
                <div>
                    <div id="userName" class="user-name">加载中...</div>
                    <div id="userRole" class="user-role">加载中...</div>
                </div>
            </div>
            <button onclick="logout()" class="btn-logout">
                <i class="bi bi-box-arrow-right"></i> 退出登录
            </button>
        </div>
    </div>

    <!-- 主内容 -->
    <div class="main-content">
        <div class="page-header">
            <div>
                <h2><i class="bi bi-graph-up me-2 text-primary"></i>学情分析</h2>
                <p class="text-muted mb-0">深度分析班级学习状况，精准定位教学问题</p>
            </div>
        </div>

        <!-- 筛选栏 -->
        <div class="filter-bar">
            <label class="text-muted">分析课程：</label>
            <select class="form-select" style="width: 200px;" id="courseSelect" onchange="handleCourseChange()"></select>
            <label class="text-muted ms-3">分析班级：</label>
            <select class="form-select" style="width: 200px;" id="classSelect" onchange="changeClass()"></select>
            <label class="text-muted ms-3">时间范围：</label>
            <select class="form-select" style="width: 150px;" id="timeRange" onchange="changeTimeRange()">
                <option value="30">近30天</option>
                <option value="7">近7天</option>
                <option value="90">本学期</option>
            </select>
        </div>

        <!-- 图表区域 -->
        <div class="row">
            <!-- 成绩分布 -->
            <div class="col-md-6">
                <div class="chart-card">
                    <div class="chart-title">
                        <i class="bi bi-bar-chart-fill text-primary"></i>
                        成绩分布
                    </div>
                    <div class="chart-container">
                        <canvas id="scoreChart"></canvas>
                    </div>
                </div>
            </div>
            
            <!-- 多维度雷达图 -->
            <div class="col-md-6">
                <div class="chart-card">
                    <div class="chart-title">
                        <i class="bi bi-bullseye text-success"></i>
                        班级能力画像
                    </div>
                    <div class="chart-container">
                        <canvas id="radarChart"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <!-- 趋势图 -->
        <div class="chart-card">
            <div class="chart-title">
                <i class="bi bi-graph-up-arrow text-info"></i>
                学习趋势（近10次测验平均分）
            </div>
            <div class="chart-container">
                <canvas id="trendChart"></canvas>
            </div>
        </div>

        <!-- 学生列表 -->
        <div class="chart-card">
            <div class="chart-title">
                <i class="bi bi-people-fill text-warning"></i>
                学生成绩排行（点击学生查看个人分析）
            </div>
            <div class="student-list">
                <div class="list-header">
                    <div>头像</div>
                    <div>学生信息</div>
                    <div>综合评分</div>
                    <div>等级</div>
                    <div>操作</div>
                </div>
                <div id="studentRanking">
                    <div class="loading">
                        <div class="spinner-border text-primary" role="status"></div>
                        <p class="mt-2">加载中...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 学生详情弹窗 -->
    <div class="modal fade" id="studentModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">学生个人学情分析</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="modalBody">
                    <!-- 动态填充 -->
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // ────────────────────────────────────────────────────────────
        //  模拟数据兜底（后端无真实数据时展示用）
        // ────────────────────────────────────────────────────────────
        const MOCK_DATA = {
            score_distribution: [8, 15, 12, 6, 3],      // 优秀/良好/中等/及格/不及格
            class_profile:      [88, 82, 75, 79, 70],   // 出勤/作业/互动/测验/预习
            grade_profile:      [85, 78, 72, 76, 68],   // 年级对比
            trend: {
                labels:    ['第1次', '第2次', '第3次', '第4次', '第5次'],
                class_avg: [75, 78, 77, 82, 80],
                grade_avg: [72, 74, 74, 79, 77]
            },
            student_ranking: [
                { id: 1, student_no: 'S001', name: '张三', score: 92.5, class_name: '示例班级' },
                { id: 2, student_no: 'S002', name: '李四', score: 88.0, class_name: '示例班级' },
                { id: 3, student_no: 'S003', name: '王五', score: 81.3, class_name: '示例班级' },
            ]
        };

        // 图表实例
        let scoreChart, radarChart, trendChart;
        let allCourses = [];

        document.addEventListener('DOMContentLoaded', () => {
            loadUserInfo();
            initCharts();
            loadInitialData();
        });

        function loadUserInfo() {
            loadUserInfoToUI(); // 使用统一的用户信息加载函数
        }

        // ── 初始化图表（空数据，等待真实数据后填充）──────────────────
        function initCharts() {
            const baseOpts = { responsive: true, maintainAspectRatio: false };

            scoreChart = new Chart(document.getElementById('scoreChart').getContext('2d'), {
                type: 'bar',
                data: {
                    labels: ['优秀(90+)', '良好(80-89)', '中等(70-79)', '及格(60-69)', '不及格(<60)'],
                    datasets: [{
                        label: '人数',
                        data: MOCK_DATA.score_distribution,
                        backgroundColor: ['#059669', '#3b82f6', '#f59e0b', '#6b7280', '#dc2626'],
                        borderRadius: 6
                    }]
                },
                options: { ...baseOpts, plugins: { legend: { display: false } } }
            });

            radarChart = new Chart(document.getElementById('radarChart').getContext('2d'), {
                type: 'radar',
                data: {
                    labels: ['出勤', '作业', '互动', '测验', '预习'],
                    datasets: [
                        {
                            label: '班级均值',
                            data: MOCK_DATA.class_profile,
                            borderColor: '#3b82f6',
                            backgroundColor: 'rgba(59,130,246,0.2)',
                            pointBackgroundColor: '#3b82f6'
                        },
                        {
                            label: '年级均值',
                            data: MOCK_DATA.grade_profile,
                            borderColor: '#9ca3af',
                            borderDash: [5, 5],
                            fill: false,
                            pointBackgroundColor: '#9ca3af'
                        }
                    ]
                },
                options: { ...baseOpts, scales: { r: { min: 0, max: 100 } } }
            });

            trendChart = new Chart(document.getElementById('trendChart').getContext('2d'), {
                type: 'line',
                data: {
                    labels: MOCK_DATA.trend.labels,
                    datasets: [
                        {
                            label: '班级均分',
                            data: MOCK_DATA.trend.class_avg,
                            borderColor: '#3b82f6',
                            backgroundColor: 'rgba(59,130,246,0.1)',
                            tension: 0.4,
                            fill: true
                        },
                        {
                            label: '年级均分',
                            data: MOCK_DATA.trend.grade_avg,
                            borderColor: '#9ca3af',
                            borderDash: [5, 5],
                            tension: 0.4,
                            fill: false
                        }
                    ]
                },
                options: { ...baseOpts, scales: { y: { min: 50, max: 100 } } }
            });

            // 初始学生列表用模拟数据
            renderStudentList(MOCK_DATA.student_ranking, true);
        }

        // ── 加载课程列表 ──────────────────────────────────────────────
        async function loadInitialData() {
            try {
                const res = await request.get('/courses/');
                allCourses = res.data || [];
                const courseSelect = document.getElementById('courseSelect');
                courseSelect.innerHTML = '<option value="">请选择课程</option>';
                allCourses.forEach(c => {
                    courseSelect.innerHTML += `<option value="${c.id}">${c.name}</option>`;
                });

                if (allCourses.length > 0) {
                    const first = allCourses[0];
                    courseSelect.value = first.id;
                    handleCourseChange();
                    if (first.classes && first.classes.length > 0) {
                        document.getElementById('classSelect').value = first.classes[0].id;
                        loadData(first.id, first.classes[0].id);
                    }
                }
            } catch (e) {
                console.error('初始化失败:', e);
            }
        }

        function handleCourseChange() {
            const courseId = document.getElementById('courseSelect').value;
            const classSelect = document.getElementById('classSelect');
            classSelect.innerHTML = '<option value="">请选择班级</option>';
            if (courseId) {
                const course = allCourses.find(c => c.id == courseId);
                if (course && course.classes) {
                    course.classes.forEach(cls => {
                        classSelect.innerHTML += `<option value="${cls.id}">${cls.name}</option>`;
                    });
                }
            }
        }

        function changeClass() {
            const courseId = document.getElementById('courseSelect').value;
            const classId  = document.getElementById('classSelect').value;
            if (courseId && classId) loadData(courseId, classId);
        }

        function changeTimeRange() { changeClass(); }

        // ── 加载课程真实分析数据，用真实数据覆盖模拟图表 ──────────────
        async function loadData(courseId, classId) {
            try {
                const res  = await request.get(`/analytics/course/${courseId}/overview`);
                const data = res.data || {};

                // 1. 成绩分布 —— 后端已计算，无数据则保持模拟
                const dist = data.score_distribution || [];
                const hasDistData = dist.some(v => v > 0);
                scoreChart.data.datasets[0].data = hasDistData ? dist : MOCK_DATA.score_distribution;
                scoreChart.update();

                // 2. 雷达图 —— 合并后端指标，"预习"暂无真实数据保留70
                const profile = data.class_profile;
                if (profile && profile.some(v => v > 0)) {
                    radarChart.data.datasets[0].data = profile;
                    // 年级均值：真实班级数据的 95% 近似值（后端未实现多班对比）
                    radarChart.data.datasets[1].data = profile.map(v => +(v * 0.95).toFixed(1));
                }
                radarChart.update();

                // 3. 趋势图 —— 后端已计算
                const trend = data.trend || {};
                const hasRealTrend = trend.labels && trend.labels.length > 0;
                if (hasRealTrend) {
                    trendChart.data.labels                  = trend.labels;
                    trendChart.data.datasets[0].data        = trend.class_avg;
                    trendChart.data.datasets[1].data        = trend.grade_avg;
                }
                trendChart.update();

                // 4. 学生排行 —— 后端已计算
                const ranking = data.student_ranking || [];
                renderStudentList(ranking.length > 0 ? ranking : MOCK_DATA.student_ranking,
                                  ranking.length === 0);

            } catch (e) {
                console.error('加载分析数据失败:', e);
            }
        }

        // ── 学生排行渲染 ──────────────────────────────────────────────
        function renderStudentList(students, isMock = false) {
            const container = document.getElementById('studentRanking');
            if (!students || students.length === 0) {
                container.innerHTML = '<div class="p-4 text-center text-muted">暂无排行数据，请先导入学生成绩</div>';
                return;
            }

            const getTag = score => {
                if (score >= 90) return ['tag-excellent', '优秀'];
                if (score >= 80) return ['tag-good',      '良好'];
                if (score >= 70) return ['tag-average',   '中等'];
                if (score >= 60) return ['tag-average',   '及格'];
                return ['tag-poor', '不及格'];
            };

            const mockTip = isMock
                ? '<div class="px-4 py-2 bg-light border-bottom text-muted small"><i class="bi bi-info-circle me-1"></i>当前显示演示数据，上传真实成绩后将自动更新</div>'
                : '';

            const rows = students.map((s, idx) => {
                const [tagClass, tagLabel] = getTag(s.score);
                const initial = s.name ? s.name[0] : '?';
                return `
                <div class="student-item" onclick="showStudentDetail(${s.id})">
                    <div class="d-flex align-items-center justify-content-center">
                        <span class="fw-bold text-muted">#${idx + 1}</span>
                    </div>
                    <div class="d-flex align-items-center gap-3">
                        <div class="student-avatar">${initial}</div>
                        <div class="student-info">
                            <h6>${s.name}</h6>
                            <small>${s.student_no}${s.class_name ? ' · ' + s.class_name : ''}</small>
                        </div>
                    </div>
                    <div class="fw-bold fs-5">${s.score}</div>
                    <div><span class="score-tag ${tagClass}">${tagLabel}</span></div>
                    <div>
                        <button class="btn btn-sm btn-outline-primary" onclick="event.stopPropagation();showStudentDetail(${s.id})">
                            <i class="bi bi-eye"></i> 详情
                        </button>
                    </div>
                </div>`;
            }).join('');

            container.innerHTML = mockTip + rows;
        }

        // ── 学生个人详情弹窗 ──────────────────────────────────────────
        async function showStudentDetail(studentId) {
            const courseId = document.getElementById('courseSelect').value;
            if (!courseId || !studentId) return;
            const modal = new bootstrap.Modal(document.getElementById('studentModal'));
            const body  = document.getElementById('modalBody');
            body.innerHTML = '<div class="text-center py-4"><div class="spinner-border text-primary"></div></div>';
            modal.show();

            try {
                const res  = await request.get(`/analytics/course/${courseId}/students/${studentId}/profile`);
                const d    = res.data;
                body.innerHTML = `
                    <div class="student-profile">
                        <div class="profile-avatar">${d.student.name[0]}</div>
                        <div class="profile-info">
                            <h4>${d.student.name}</h4>
                            <p>${d.student.student_no} · ${d.student.class_name}</p>
                        </div>
                    </div>
                    <div class="metric-grid">
                        <div class="metric-item">
                            <div class="metric-value text-success">${d.attendance.rate}%</div>
                            <div class="metric-label">出勤率</div>
                        </div>
                        <div class="metric-item">
                            <div class="metric-value text-primary">${d.homework.avg_score}</div>
                            <div class="metric-label">作业均分</div>
                        </div>
                        <div class="metric-item">
                            <div class="metric-value text-warning">${d.quiz.avg_score}</div>
                            <div class="metric-label">测验均分</div>
                        </div>
                        <div class="metric-item">
                            <div class="metric-value text-info">${d.student.score}</div>
                            <div class="metric-label">综合评分</div>
                        </div>
                    </div>`;
            } catch (e) {
                body.innerHTML = '<div class="text-center text-danger py-4">加载失败，请稍后重试</div>';
            }
        }

        function logout() {
            if (confirm('确定退出？')) { localStorage.clear(); window.location.href = 'login.html'; }
        }
    </script>
</body>
</html>
