<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学情分析 - 教学监督系统</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <!-- 全局配置和工具 -->
    <script src="../js/config.js"></script>
    <script src="../js/request.js"></script>
    <script src="../js/auth.js"></script>

    <!-- 图表库 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: #f5f7fa; }
        
        .sidebar {
            position: fixed; left: 0; top: 0; bottom: 0; width: 260px;
            background: #1e293b; color: white; overflow-y: auto; z-index: 1000;
            display: flex; flex-direction: column;
        }
        .sidebar-header { padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .sidebar-header h4 { margin: 0; font-size: 18px; display: flex; align-items: center; gap: 10px; }
        .sidebar-menu { padding: 15px 0; flex: 1; }
        .menu-item {
            padding: 12px 20px; display: flex; align-items: center; gap: 12px;
            color: rgba(255,255,255,0.7); text-decoration: none; transition: all 0.3s;
            border-left: 3px solid transparent;
        }
        .menu-item:hover { background: rgba(255,255,255,0.1); color: white; }
        .menu-item.active { background: rgba(102, 126, 234, 0.2); color: white; border-left-color: #667eea; }
        .sidebar-footer { padding: 20px; border-top: 1px solid rgba(255,255,255,0.1); }
        .user-info { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
        .avatar { width: 40px; height: 40px; background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .user-name { font-weight: 600; font-size: 14px; }
        .user-role { font-size: 12px; opacity: 0.7; }
        .btn-logout { width: 100%; padding: 8px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 6px; color: white; font-size: 13px; cursor: pointer; }
        .btn-logout:hover { background: rgba(255,255,255,0.2); }
        
        .main-content { margin-left: 260px; padding: 30px; min-height: 100vh; }
        .page-header { margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; }
        .page-header h2 { color: #1e293b; font-weight: 700; margin: 0; }
        
        .filter-bar {
            background: white; padding: 15px 20px; border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 25px;
            display: flex; gap: 15px; align-items: center;
        }
        
        .chart-card {
            background: white; border-radius: 16px; padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 24px;
        }
        .chart-title {
            font-size: 16px; font-weight: 600; color: #1e293b;
            margin-bottom: 20px; display: flex; align-items: center; gap: 8px;
        }
        .chart-container { position: relative; height: 300px; }
        
        .student-list {
            background: white; border-radius: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08); overflow: hidden;
        }
        .list-header {
            display: grid; grid-template-columns: 60px 2fr 1fr 1fr 100px;
            padding: 15px 20px; background: #f8fafc;
            font-weight: 600; color: #475569; font-size: 14px;
        }
        .student-item {
            display: grid; grid-template-columns: 60px 2fr 1fr 1fr 100px;
            padding: 12px 20px; border-top: 1px solid #f1f5f9;
            align-items: center; cursor: pointer; transition: all 0.2s;
        }
        .student-item:hover { background: #f8fafc; }
        .student-avatar {
            width: 40px; height: 40px; border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: 600;
        }
        .student-info h6 { margin: 0; color: #1e293b; font-weight: 600; }
        .student-info small { color: #94a3b8; }
        .score-tag {
            padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 500;
        }
        .tag-excellent { background: #d1fae5; color: #059669; }
        .tag-good { background: #dbeafe; color: #1e40af; }
        .tag-average { background: #fef3c7; color: #d97706; }
        .tag-poor { background: #fee2e2; color: #dc2626; }
        
        /* 个人详情弹窗 */
        .modal-body .student-profile {
            display: flex; align-items: center; gap: 20px; margin-bottom: 24px;
        }
        .modal-body .profile-avatar {
            width: 80px; height: 80px; border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 32px; font-weight: 600;
        }
        .profile-info h4 { margin: 0 0 8px 0; color: #1e293b; }
        .profile-info p { margin: 0; color: #64748b; }
        .metric-grid {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px;
        }
        .metric-item {
            background: #f8fafc; padding: 16px; border-radius: 12px; text-align: center;
        }
        .metric-value { font-size: 24px; font-weight: 700; color: #1e293b; }
        .metric-label { font-size: 13px; color: #64748b; margin-top: 4px; }
    </style>

    <script>
        // 路由守卫
        try {
            if (typeof checkAuth === 'function') checkAuth();
        } catch (e) {
            console.error('Auth check failed:', e);
            window.location.href = 'login.html';
        }
    </script>
</head>
<body>
    <!-- 统一侧边栏 -->
    <div class="sidebar">
        <div class="sidebar-header">
            <h4><i class="bi bi-mortarboard-fill"></i> 教学监督系统</h4>
        </div>
        
        <div class="sidebar-menu">
            <a href="dashboard.html" class="menu-item" id="nav-dashboard">
                <i class="bi bi-speedometer2"></i> 仪表盘
            </a>
            <a href="courses.html" class="menu-item" id="nav-courses">
                <i class="bi bi-book"></i> 课程管理
            </a>
            <a href="users.html" class="menu-item" id="nav-users" data-capability="manage_users">
                <i class="bi bi-person-gear"></i> 用户管理
            </a>
            <a href="students.html" class="menu-item" id="nav-students">
                <i class="bi bi-people"></i> 学生管理
            </a>
            <a href="data-import.html" class="menu-item" id="nav-import">
                <i class="bi bi-upload"></i> 数据导入
            </a>
            <a href="analytics.html" class="menu-item active" id="nav-analytics">
                <i class="bi bi-graph-up"></i> 学情分析
            </a>
            <a href="warnings.html" class="menu-item" id="nav-warnings">
                <i class="bi bi-exclamation-triangle"></i> 预警中心
            </a>
        </div>
        
        <div class="sidebar-footer">
            <div class="user-info">
                <div class="avatar"><i class="bi bi-person-fill"></i></div>
                <div>
                    <div id="userName" class="user-name">加载中...</div>
                    <div id="userRole" class="user-role">加载中...</div>
                </div>
            </div>
            <button onclick="logout()" class="btn-logout">
                <i class="bi bi-box-arrow-right"></i> 退出登录
            </button>
        </div>
    </div>

    <!-- 主内容 -->
    <div class="main-content">
        <div class="page-header">
            <div>
                <h2><i class="bi bi-graph-up me-2 text-primary"></i>学情分析</h2>
                <p class="text-muted mb-0">深度分析班级学习状况，精准定位教学问题</p>
            </div>
        </div>

        <!-- 筛选栏 -->
        <div class="filter-bar">
            <label class="text-muted">分析课程：</label>
            <select class="form-select" style="width: 200px;" id="courseSelect" onchange="handleCourseChange()"></select>
            <label class="text-muted ms-3">分析班级：</label>
            <select class="form-select" style="width: 200px;" id="classSelect" onchange="changeClass()"></select>
            <label class="text-muted ms-3">时间范围：</label>
            <select class="form-select" style="width: 150px;" id="timeRange" onchange="changeTimeRange()">
                <option value="30">近30天</option>
                <option value="7">近7天</option>
                <option value="90">本学期</option>
            </select>
        </div>

        <!-- 图表区域 -->
        <div class="row">
            <!-- 成绩分布 -->
            <div class="col-md-6">
                <div class="chart-card">
                    <div class="chart-title">
                        <i class="bi bi-bar-chart-fill text-primary"></i>
                        成绩分布
                    </div>
                    <div class="chart-container">
                        <canvas id="scoreChart"></canvas>
                    </div>
                </div>
            </div>
            
            <!-- 多维度雷达图 -->
            <div class="col-md-6">
                <div class="chart-card">
                    <div class="chart-title">
                        <i class="bi bi-bullseye text-success"></i>
                        班级能力画像
                    </div>
                    <div class="chart-container">
                        <canvas id="radarChart"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <!-- 趋势图 -->
        <div class="chart-card">
            <div class="chart-title">
                <i class="bi bi-graph-up-arrow text-info"></i>
                学习趋势（近10次测验平均分）
            </div>
            <div class="chart-container">
                <canvas id="trendChart"></canvas>
            </div>
        </div>

        <!-- 学生列表 -->
        <div class="chart-card">
            <div class="chart-title">
                <i class="bi bi-people-fill text-warning"></i>
                学生成绩排行（点击学生查看个人分析）
            </div>
            <div class="student-list">
                <div class="list-header">
                    <div>头像</div>
                    <div>学生信息</div>
                    <div>综合评分</div>
                    <div>等级</div>
                    <div>操作</div>
                </div>
                <div id="studentRanking">
                    <div class="loading">
                        <div class="spinner-border text-primary" role="status"></div>
                        <p class="mt-2">加载中...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 学生详情弹窗 -->
    <div class="modal fade" id="studentModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">学生个人学情分析</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="modalBody">
                    <!-- 动态填充 -->
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let scoreChart;
        let radarChart;
        let trendChart;
        let allCourses = [];

        document.addEventListener('DOMContentLoaded', () => {
            loadUserInfoToUI();
            initCharts();
            loadInitialData();
        });

        function ensureChartState(canvasId, stateId) {
            const canvas = document.getElementById(canvasId);
            if (!canvas) {
                return null;
            }

            let stateEl = document.getElementById(stateId);
            if (!stateEl) {
                stateEl = document.createElement('div');
                stateEl.id = stateId;
                stateEl.className = 'text-center text-muted small mt-3';
                canvas.parentElement.insertAdjacentElement('afterend', stateEl);
            }
            return stateEl;
        }

        function setChartState(stateId, message) {
            const el = document.getElementById(stateId);
            if (el) {
                el.textContent = message || '';
                el.style.display = message ? '' : 'none';
            }
        }

        function initCharts() {
            const baseOpts = { responsive: true, maintainAspectRatio: false };
            ensureChartState('scoreChart', 'scoreChartState');
            ensureChartState('radarChart', 'radarChartState');
            ensureChartState('trendChart', 'trendChartState');

            scoreChart = new Chart(document.getElementById('scoreChart'), {
                type: 'bar',
                data: {
                    labels: ['优秀(90+)', '良好(80-89)', '中等(70-79)', '及格(60-69)', '不及格(<60)'],
                    datasets: [{
                        label: '人数',
                        data: [0, 0, 0, 0, 0],
                        backgroundColor: ['#059669', '#3b82f6', '#f59e0b', '#6b7280', '#dc2626'],
                        borderRadius: 6
                    }]
                },
                options: { ...baseOpts, plugins: { legend: { display: false } } }
            });

            radarChart = new Chart(document.getElementById('radarChart'), {
                type: 'radar',
                data: {
                    labels: ['出勤', '作业', '测验', '互动'],
                    datasets: [{
                        label: '班级均值',
                        data: [],
                        borderColor: '#3b82f6',
                        backgroundColor: 'rgba(59,130,246,0.18)',
                        pointBackgroundColor: '#3b82f6'
                    }]
                },
                options: { ...baseOpts, scales: { r: { min: 0, max: 100 } } }
            });

            trendChart = new Chart(document.getElementById('trendChart'), {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        label: '班级均分',
                        data: [],
                        borderColor: '#3b82f6',
                        backgroundColor: 'rgba(59,130,246,0.1)',
                        tension: 0.35,
                        fill: true
                    }]
                },
                options: { ...baseOpts, scales: { y: { min: 0, max: 100 } } }
            });

            setChartState('scoreChartState', '暂无数据');
            setChartState('radarChartState', '暂无数据');
            setChartState('trendChartState', '暂无数据');
            renderStudentList([]);
        }

        async function loadInitialData() {
            try {
                const res = await request.get('/courses/');
                allCourses = res.data || [];
                const courseSelect = document.getElementById('courseSelect');
                courseSelect.innerHTML = '<option value="">请选择课程</option>';

                allCourses.forEach((course) => {
                    courseSelect.innerHTML += `<option value="${course.id}">${course.name}</option>`;
                });

                if (!allCourses.length) {
                    renderStudentList([]);
                    return;
                }

                courseSelect.value = allCourses[0].id;
                handleCourseChange();
            } catch (error) {
                console.error('初始化分析页失败:', error);
                renderStudentList([]);
            }
        }

        function handleCourseChange() {
            const courseId = document.getElementById('courseSelect').value;
            const classSelect = document.getElementById('classSelect');
            classSelect.innerHTML = '<option value="">全部班级</option>';

            const course = allCourses.find((item) => String(item.id) === String(courseId));
            if (course && Array.isArray(course.classes)) {
                course.classes.forEach((cls) => {
                    classSelect.innerHTML += `<option value="${cls.id}">${cls.name}</option>`;
                });
            }

            loadData(courseId, classSelect.value);
        }

        function changeClass() {
            loadData(
                document.getElementById('courseSelect').value,
                document.getElementById('classSelect').value
            );
        }

        function changeTimeRange() {
            changeClass();
        }

        async function loadData(courseId, classId) {
            if (!courseId) {
                renderStudentList([]);
                return;
            }

            try {
                const params = classId ? { class_id: classId } : {};
                const res = await request.get(`/analytics/course/${courseId}/overview`, params);
                const data = res.data || {};

                updateScoreChart(data.score_distribution || []);
                updateRadarChart(data.class_profile || []);
                updateTrendChart(data.trend || {});
                renderStudentList(data.student_ranking || []);
            } catch (error) {
                console.error('加载分析数据失败:', error);
                updateScoreChart([]);
                updateRadarChart([]);
                updateTrendChart({});
                renderStudentList([]);
            }
        }

        function updateScoreChart(distribution) {
            const values = Array.isArray(distribution) && distribution.length === 5
                ? distribution
                : [0, 0, 0, 0, 0];
            scoreChart.data.datasets[0].data = values;
            scoreChart.update();
            setChartState('scoreChartState', values.some((value) => value > 0) ? '' : '暂无数据');
        }

        function updateRadarChart(profile) {
            const values = Array.isArray(profile) && profile.length
                ? profile
                : [];
            radarChart.data.datasets[0].data = values;
            radarChart.update();
            setChartState('radarChartState', values.length ? '' : '暂无数据');
        }

        function updateTrendChart(trend) {
            const labels = trend.labels || [];
            const scores = trend.class_avg || [];
            trendChart.data.labels = labels;
            trendChart.data.datasets[0].data = scores;
            trendChart.update();
            setChartState('trendChartState', labels.length ? '' : '暂无数据');
        }

        function getScoreTag(score) {
            if (score >= 90) return ['tag-excellent', '优秀'];
            if (score >= 80) return ['tag-good', '良好'];
            if (score >= 70) return ['tag-average', '中等'];
            if (score >= 60) return ['tag-average', '及格'];
            return ['tag-poor', '待提升'];
        }

        function renderStudentList(students) {
            const container = document.getElementById('studentRanking');
            if (!students.length) {
                container.innerHTML = '<div class="p-4 text-center text-muted">暂无数据，请先导入该课程的考勤、作业、测验或互动数据。</div>';
                return;
            }

            container.innerHTML = students.map((student, index) => {
                const [tagClass, tagLabel] = getScoreTag(student.score || 0);
                const coverage = student.coverage || {};
                const coveredCount = coverage.covered_count ?? 0;
                const totalCount = coverage.total_count ?? 4;
                return `
                    <div class="student-item" onclick="showStudentDetail(${student.id})">
                        <div class="d-flex align-items-center justify-content-center">
                            <span class="fw-bold text-muted">#${index + 1}</span>
                        </div>
                        <div class="d-flex align-items-center gap-3">
                            <div class="student-avatar">${student.name ? student.name[0] : '?'}</div>
                            <div class="student-info">
                                <h6>${student.name || '-'}</h6>
                                <small>${student.student_no || '-'}${student.class_name ? ` · ${student.class_name}` : ''}</small>
                            </div>
                        </div>
                        <div class="fw-bold fs-5">${student.score ?? 0}</div>
                        <div>
                            <span class="score-tag ${tagClass}">${tagLabel}</span>
                            <div class="text-muted small mt-1">覆盖率 ${coveredCount}/${totalCount}</div>
                        </div>
                        <div>
                            <button class="btn btn-sm btn-outline-primary" onclick="event.stopPropagation(); showStudentDetail(${student.id})">
                                <i class="bi bi-eye"></i> 详情
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function formatMetric(value, suffix = '') {
            if (value == null) {
                return '暂无';
            }
            return `${value}${suffix}`;
        }

        function formatCoverageList(items) {
            return items && items.length ? items.join('、') : '无';
        }

        async function showStudentDetail(studentId) {
            const courseId = document.getElementById('courseSelect').value;
            if (!courseId || !studentId) {
                return;
            }

            const modal = new bootstrap.Modal(document.getElementById('studentModal'));
            const body = document.getElementById('modalBody');
            body.innerHTML = '<div class="text-center py-4"><div class="spinner-border text-primary"></div></div>';
            modal.show();

            try {
                const res = await request.get(`/analytics/course/${courseId}/students/${studentId}/profile`);
                const data = res.data || {};
                const student = data.student || {};
                const metrics = data.metrics || {};
                const coverage = data.coverage || {};

                body.innerHTML = `
                    <div class="student-profile">
                        <div class="profile-avatar">${student.name ? student.name[0] : '?'}</div>
                        <div class="profile-info">
                            <h4>${student.name || '-'}</h4>
                            <p>${student.student_no || '-'} · ${student.class_name || '未分班级'}</p>
                            <p class="mt-2 mb-0 text-primary fw-semibold">综合评分：${student.score ?? 0}</p>
                        </div>
                    </div>
                    <div class="metric-grid">
                        <div class="metric-item">
                            <div class="metric-value text-success">${formatMetric(metrics.attendance, '%')}</div>
                            <div class="metric-label">出勤率</div>
                        </div>
                        <div class="metric-item">
                            <div class="metric-value text-primary">${formatMetric(metrics.homework)}</div>
                            <div class="metric-label">作业得分</div>
                        </div>
                        <div class="metric-item">
                            <div class="metric-value text-warning">${formatMetric(metrics.quiz)}</div>
                            <div class="metric-label">测验得分</div>
                        </div>
                        <div class="metric-item">
                            <div class="metric-value text-info">${formatMetric(metrics.interaction)}</div>
                            <div class="metric-label">课堂互动</div>
                        </div>
                    </div>
                    <div class="alert alert-light border">
                        <div class="fw-semibold mb-2">覆盖率</div>
                        <div class="small text-muted">已覆盖 ${coverage.covered_count ?? 0}/${coverage.total_count ?? 4} 项</div>
                        <div class="small text-muted mt-1">已覆盖指标：${formatCoverageList(coverage.covered_fields)}</div>
                        <div class="small text-muted mt-1">缺失指标：${formatCoverageList(coverage.missing_fields)}</div>
                    </div>
                    <div>
                        <h6 class="mb-3">测验趋势</h6>
                        <canvas id="studentTrendChart" height="120"></canvas>
                        <div id="studentTrendState" class="text-center text-muted small mt-3" style="display:none;"></div>
                    </div>
                `;

                const labels = data.trend?.labels || [];
                const scores = data.trend?.scores || [];
                if (!labels.length) {
                    document.getElementById('studentTrendState').style.display = '';
                    document.getElementById('studentTrendState').textContent = '暂无数据';
                    return;
                }

                setTimeout(() => {
                    new Chart(document.getElementById('studentTrendChart'), {
                        type: 'line',
                        data: {
                            labels,
                            datasets: [{
                                label: '测验成绩',
                                data: scores,
                                borderColor: '#10b981',
                                backgroundColor: 'rgba(16,185,129,0.12)',
                                tension: 0.35,
                                fill: true
                            }]
                        },
                        options: {
                            responsive: true,
                            scales: { y: { min: 0, max: 100 } }
                        }
                    });
                }, 50);
            } catch (error) {
                console.error('加载学生详情失败:', error);
                body.innerHTML = '<div class="text-center text-danger py-4">加载失败，请稍后重试</div>';
            }
        }

        function logout() {
            if (confirm('确定退出？')) {
                localStorage.clear();
                window.location.href = 'login.html';
            }
        }
    </script>
</body>
</html>
